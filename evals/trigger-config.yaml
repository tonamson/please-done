# Trigger Accuracy Tests — Do skill descriptions trigger correctly?
# Evaluates false positives (wrong trigger) and false negatives (no trigger when expected)

description: "Please Done Skills — Trigger Accuracy"

prompts:
  - file://trigger-wrapper.js

providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    label: "Claude Sonnet"
    config:
      max_tokens: 50
      temperature: 0

defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-20250514
      config:
        temperature: 0

tests:
  # ══════════════════════════════════════════════════════════════
  # TRUE POSITIVES — user request MUST trigger the correct skill
  # ══════════════════════════════════════════════════════════════

  - description: "Trigger pd:init — initialize project"
    vars:
      user_request: "Initialize a new project for me"
    assert:
      - type: icontains
        value: "pd:init"

  - description: "Trigger pd:scan — scan project"
    vars:
      user_request: "Scan the project to see its structure"
    assert:
      - type: icontains
        value: "pd:scan"

  - description: "Trigger pd:new-milestone — create roadmap"
    vars:
      user_request: "Create a development roadmap for the project"
    assert:
      - type: icontains
        value: "pd:new-milestone"

  - description: "Trigger pd:plan — technical design"
    vars:
      user_request: "Create a technical plan for the authentication phase"
    assert:
      - type: icontains
        value: "pd:plan"

  - description: "Trigger pd:write-code — write code"
    vars:
      user_request: "Write code for the next task"
    assert:
      - type: icontains
        value: "pd:write-code"

  - description: "Trigger pd:test — run tests"
    vars:
      user_request: "Run tests for the users module"
    assert:
      - type: icontains
        value: "pd:test"

  - description: "Trigger pd:fix-bug — fix bug"
    vars:
      user_request: "The login API returns 500, fix it for me"
    assert:
      - type: icontains
        value: "pd:fix-bug"

  - description: "Trigger pd:complete-milestone — close version"
    vars:
      user_request: "Complete the current milestone, create a tag"
    assert:
      - type: icontains
        value: "pd:complete-milestone"

  - description: "Trigger pd:what-next — ask what to do next"
    vars:
      user_request: "What should I do next?"
    assert:
      - type: icontains
        value: "pd:what-next"

  - description: "Trigger pd:fetch-doc — fetch documentation"
    vars:
      user_request: "Fetch NestJS guards docs for me"
    assert:
      - type: icontains
        value: "pd:fetch-doc"

  - description: "Trigger pd:update — update skills"
    vars:
      user_request: "Check if there is a new version of the skills"
    assert:
      - type: icontains
        value: "pd:update"

  - description: "Trigger pd:conventions — create conventions"
    vars:
      user_request: "Create a conventions file for this project"
    assert:
      - type: icontains
        value: "pd:conventions"

  - description: "Trigger pd:conventions — CLAUDE.md"
    vars:
      user_request: "Analyze the code style and create CLAUDE.md"
    assert:
      - type: icontains
        value: "pd:conventions"

  # ══════════════════════════════════════════════════════════════
  # TRUE NEGATIVES — request should NOT trigger any skill
  # ══════════════════════════════════════════════════════════════

  - description: "No trigger — refactor code (general task)"
    vars:
      user_request: "Refactor the calculateTotal function to be cleaner"
    assert:
      - type: icontains
        value: "none"

  - description: "No trigger — deploy (no deploy skill)"
    vars:
      user_request: "Deploy to the production server"
    assert:
      - type: icontains
        value: "none"

  - description: "No trigger — explain code"
    vars:
      user_request: "Explain the code in the auth.guard.ts file"
    assert:
      - type: icontains
        value: "none"

  - description: "No trigger — create README"
    vars:
      user_request: "Write a README.md for the project"
    assert:
      - type: icontains
        value: "none"

  # ══════════════════════════════════════════════════════════════
  # AMBIGUOUS — distinguish between similar skills
  # ══════════════════════════════════════════════════════════════

  - description: "Disambiguate scan vs init — already initialized, need scan"
    vars:
      user_request: "The project is already initialized, now scan the detailed structure"
    assert:
      - type: icontains
        value: "pd:scan"

  - description: "Disambiguate plan vs new-milestone — need specific plan for 1 phase"
    vars:
      user_request: "Create a detailed design for phase 1.2 CRUD Products"
    assert:
      - type: icontains
        value: "pd:plan"

  - description: "Disambiguate fix-bug vs write-code — task has error"
    vars:
      user_request: "Task 3 has an error, the endpoint returns the wrong response"
    assert:
      - type: icontains
        value: "pd:fix-bug"

  - description: "Disambiguate write-code vs plan — no plan yet"
    vars:
      user_request: "Start coding a new feature that hasn't been planned yet"
    assert:
      - type: icontains
        value: "pd:plan"
