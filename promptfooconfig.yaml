  # pd:complete-milestone — Solidity project
  # ══════════════════════════════════════════════════════════════

  - description: "pd:complete-milestone — Solidity project with TEST_REPORT"
    vars:
      skill_file: commands/pd/complete-milestone.md
      scenario: |
        Project Solidity (Hardhat) tại /app/my-defi-protocol.
        Kết quả tool calls giả lập:
        - CONTEXT.md → tồn tại, Solidity (Hardhat), không có NestJS/NextJS
        - CURRENT_MILESTONE.md → version: 1.0, milestone: "Core Contracts", status: Đang thực hiện
        - .planning/milestones/1.0/ chứa phase-1.1/
        - ROADMAP.md liệt kê Phase 1.1 cho milestone 1.0
        - phase-1.1/TASKS.md → 2 tasks, tất cả ✅
        - phase-1.1/reports/ → CODE_REPORT_TASK_1, CODE_REPORT_TASK_2
        - phase-1.1/TEST_REPORT.md → tồn tại, tất cả pass (Hardhat tests)
        - .planning/bugs/ → không có bugs
        - ROADMAP.md → chỉ có Milestone 1 (v1.0), không có milestone tiếp
        - git rev-parse → có git
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra complete-milestone cho Solidity project:
