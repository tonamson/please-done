          3. PHẢI tạo MILESTONE_COMPLETE.md
          4. PHẢI tạo CHANGELOG.md
          5. PHẢI cập nhật ROADMAP → ✅
          6. PHẢI git commit [PHIÊN BẢN] + tạo tag v1.0
          7. PHẢI cập nhật CURRENT_MILESTONE → "Hoàn tất toàn bộ" (không có milestone tiếp)
      - type: icontains
        value: "v1.0"

