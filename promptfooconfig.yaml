# Please Done Skills — Evaluation Suite
# Đánh giá: Claude có thực thi đúng workflow từng skill không?
#
# Chạy:  npm run eval
# Xem:   npm run eval:view
# Filter: npm run eval:filter -- "pd:init"
# Full:  npm run eval:full (workflow + trigger + benchmark)
#
# ═══════════════════════════════════════════════════════════════
# SKILL CLASSIFICATION (theo Anthropic blog best practices)
# ═══════════════════════════════════════════════════════════════
#
# Tất cả 11 skills thuộc loại: ENCODED PREFERENCE
# → Encode workflow chuẩn mà Claude có thể tự làm từng bước,
#   nhưng skill đảm bảo thứ tự, format, output nhất quán.
#
# Core Workflow (thứ tự bắt buộc):
#   pd:init            — Encoded Preference — khởi tạo môi trường
#   pd:scan            — Encoded Preference — quét + báo cáo project
#   pd:new-milestone   — Encoded Preference — lập roadmap chiến lược
#   pd:plan            — Encoded Preference — thiết kế kỹ thuật + chia task
#   pd:write-code      — Encoded Preference — viết code theo plan
#   pd:test            — Encoded Preference — kiểm thử [Jest/Supertest|PHPUnit|Hardhat/Foundry]
#   pd:fix-bug         — Encoded Preference — debug loop có báo cáo
#   pd:complete-milestone — Encoded Preference — đóng version + git tag
#
# Utility (chạy bất kỳ lúc nào):
#   pd:what-next       — Encoded Preference — gợi ý bước tiếp theo
#   pd:fetch-doc       — Encoded Preference — tải + cache documentation
#   pd:update          — Encoded Preference — self-update từ GitHub
#
# Vì là Encoded Preference → eval focus vào WORKFLOW FIDELITY:
#   skill có follow đúng thứ tự, format, rules không?
# ═══════════════════════════════════════════════════════════════

description: "Please Done Skills — Workflow Compliance Evaluation"

prompts:
  - file://evals/prompt-wrapper.js

providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    label: "Claude Sonnet"
    config:
      max_tokens: 4096
      temperature: 0

# Model dùng để chấm điểm llm-rubric
defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-20250514
      config:
        temperature: 0

tests:
  # ══════════════════════════════════════════════════════════════
  # pd:init — Khởi tạo môi trường
  # ══════════════════════════════════════════════════════════════

  - description: "pd:init — Existing NestJS project (detect backend, copy rules)"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/my-backend.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công, trả về danh sách repos
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → tìm thấy 50+ files .ts
        - Glob **/nest-cli.json → tìm thấy /app/my-backend/nest-cli.json
        - Glob **/next.config.* → KHÔNG tìm thấy
        - package.json có: @nestjs/core@10.3.0, @nestjs/common, prisma
        - .pdconfig có SKILLS_DIR=/home/user/skills
        - Chưa có thư mục .planning/
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra response có follow đúng workflow pd:init không:
          1. PHẢI kiểm tra FastCode MCP (gọi mcp__fastcode__list_indexed_repos)
          2. PHẢI kiểm tra CONTEXT.md chưa tồn tại → tiếp tục (KHÔNG hỏi user)
          3. PHẢI kiểm tra có source files → isNewProject = false
          4. PHẢI gọi mcp__fastcode__code_qa để index project
          5. PHẢI detect NestJS qua nest-cli.json → hasBackend = true
          6. PHẢI detect KHÔNG có frontend → hasFrontend = false
          7. PHẢI tạo thư mục .planning/ (scan, docs, bugs, rules)
          8. PHẢI copy general.md + backend.md vào .planning/rules/ (KHÔNG copy frontend.md)
          9. PHẢI tạo CONTEXT.md dưới 50 dòng
          10. PHẢI hiển thị bảng thông báo hoàn tất
      - type: contains
        value: "mcp__fastcode"
      - type: contains
        value: "backend.md"
      - type: contains
        value: "general.md"

  - description: "pd:init — New empty project (no source code)"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/new-project.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → KHÔNG tìm thấy file nào
        - Chỉ có package.json và README.md
        - .pdconfig có SKILLS_DIR=/home/user/skills
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra response cho project mới:
          1. PHẢI kiểm tra FastCode MCP thành công
          2. PHẢI detect không có source files → isNewProject = true
          3. KHÔNG ĐƯỢC gọi mcp__fastcode__code_qa (skip indexing vì project mới)
          4. PHẢI hỏi user "Dự án mới chưa có code. Bạn muốn xây dựng gì?"
          5. PHẢI chỉ copy general.md (KHÔNG copy backend.md hay frontend.md)
          6. PHẢI tạo CONTEXT.md với "Dự án mới: Có"

  - description: "pd:init — Vite project with main.ts → must NOT detect as NestJS backend"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/vite-app.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → tìm thấy 30+ files .tsx
        - Glob **/nest-cli.json → KHÔNG tìm thấy
        - Glob **/app.module.ts → KHÔNG tìm thấy
        - Glob **/main.ts → tìm thấy /app/vite-app/src/main.ts
        - Grep NestFactory trong main.ts → KHÔNG tìm thấy (file chứa: import React; ReactDOM.createRoot...)
        - Glob **/next.config.* → KHÔNG tìm thấy
        - Glob **/vite.config.* → tìm thấy /app/vite-app/vite.config.ts
        - Glob **/*.tsx → 20+ files
        - .pdconfig có SKILLS_DIR=/home/user/skills
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra response cho Vite project có main.ts:
          1. KHÔNG ĐƯỢC detect hasBackend = true (main.ts không chứa NestFactory)
          2. PHẢI detect hasFrontend = true (qua vite.config.ts hoặc nhiều .tsx files)
          3. PHẢI copy general.md + frontend.md (KHÔNG copy backend.md)
          4. CONTEXT.md KHÔNG ĐƯỢC ghi NestJS trong Tech Stack

  - description: "pd:init — WordPress project (detect wp-config.php, copy rules + refs)"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/wordpress-site.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → tìm thấy 10+ files .php
        - Glob **/nest-cli.json → KHÔNG tìm thấy
        - Glob **/next.config.* → KHÔNG tìm thấy
        - Glob **/wp-config.php → tìm thấy /app/wordpress-site/wp-config.php
        - Glob **/wp-content/plugins/*/ → tìm thấy /app/wordpress-site/wp-content/plugins/my-plugin/
        - .pdconfig có SKILLS_DIR=/home/user/skills
        - [SKILLS_DIR]/commands/pd/rules/wordpress.md → tồn tại
        - [SKILLS_DIR]/commands/pd/rules/wordpress-refs/ → tồn tại (9 files)
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra WordPress detection và rules copy:
          1. PHẢI detect WordPress qua wp-config.php → hasWordPress = true
          2. hasBackend và hasFrontend có thể false (WordPress project thuần, không có NestJS/NextJS)
          3. PHẢI copy general.md vào .planning/rules/
          4. PHẢI copy wordpress.md vào .planning/rules/
          5. PHẢI copy wordpress-refs/ vào .planning/docs/wordpress/ (9 reference files)
          6. KHÔNG copy backend.md hoặc frontend.md (không có NestJS/NextJS)
          7. CONTEXT.md PHẢI ghi WordPress trong Tech Stack
      - type: icontains
        value: "wordpress"

  - description: "pd:write-code — WordPress task must read wordpress.md rules"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Project WordPress tại /app/wordpress-site. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CONTEXT.md → WordPress (plugin development), không có NestJS/NextJS
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → thiết kế custom post type "Book" + REST API endpoint
        - TASKS.md: Task 1: ⬜ (Phụ thuộc: Không) — Register Custom Post Type
        - .planning/rules/wordpress.md → tồn tại
        - .planning/docs/wordpress/plugin-architecture.md → tồn tại
        - git rev-parse → có git repo
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra write-code cho WordPress task:
          1. PHẢI đọc .planning/rules/wordpress.md trước khi code
          2. PHẢI tuân thủ WordPress coding standards (tabs, snake_case, Yoda conditions)
          3. PHẢI có defined('ABSPATH') check ở đầu file PHP
          4. PHẢI prefix functions/classes với plugin slug
          5. PHẢI dùng sanitize/escape cho input/output
          6. PHẢI tra cứu .planning/docs/wordpress/ cho patterns phức tạp (nếu cần)
          7. PHẢI chạy lint (composer run lint) nếu đã setup
      - type: icontains
        value: "wordpress"

  - description: "pd:test — WordPress project → PHPUnit + WP_UnitTestCase"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Project WordPress tại /app/wordpress-site.
        Kết quả tool calls giả lập:
        - CONTEXT.md → WordPress (plugin development), không có NestJS
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → custom post type + REST API
        - TASKS.md → Task 1: ✅ (Register CPT), Task 2: ✅ (REST endpoint)
        - composer.json có phpunit/phpunit, wp-phpunit/wp-phpunit
        - .planning/docs/wordpress/testing.md → tồn tại
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra test flow cho WordPress:
          1. PHẢI detect WordPress (KHÔNG phải NestJS) → chuyển sang PHPUnit flow
          2. PHẢI kiểm tra PHPUnit + wp-phpunit đã cài
          3. PHẢI đọc .planning/docs/wordpress/testing.md cho patterns
          4. PHẢI viết test files dùng WP_UnitTestCase (KHÔNG phải Jest/Supertest)
          5. PHẢI dùng factory methods ($this->factory()->post->create())
          6. PHẢI chạy ./vendor/bin/phpunit (KHÔNG phải npm test)
          7. KHÔNG viết .spec.ts files
      - type: icontains
        value: "phpunit"

  - description: "pd:init — Solidity project (detect hardhat, copy rules + refs)"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/my-defi-protocol.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → tìm thấy 5 files .sol + 3 files .ts (test/scripts)
        - Glob **/nest-cli.json → KHÔNG tìm thấy
        - Glob **/next.config.* → KHÔNG tìm thấy
        - Glob **/wp-config.php → KHÔNG tìm thấy
        - Glob **/hardhat.config.* → tìm thấy /app/my-defi-protocol/hardhat.config.ts
        - .pdconfig có SKILLS_DIR=/home/user/skills
        - [SKILLS_DIR]/commands/pd/rules/solidity.md → tồn tại
        - [SKILLS_DIR]/commands/pd/rules/solidity-refs/ → tồn tại (2 files)
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra Solidity detection và rules copy:
          1. PHẢI detect Solidity qua hardhat.config.ts → hasSolidity = true
          2. hasBackend và hasFrontend có thể false (Solidity project thuần, không có NestJS/NextJS)
          3. PHẢI copy general.md vào .planning/rules/
          4. PHẢI copy solidity.md vào .planning/rules/
          5. PHẢI copy solidity-refs/ vào .planning/docs/solidity/ (2 reference files)
          6. KHÔNG copy backend.md, frontend.md, hoặc wordpress.md
          7. CONTEXT.md PHẢI ghi Solidity/Hardhat trong Tech Stack
      - type: icontains
        value: "solidity"

  - description: "pd:write-code — Solidity task must read solidity.md rules + security checklist"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Project Solidity tại /app/my-defi-protocol. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CONTEXT.md → Solidity (Hardhat), không có NestJS/NextJS/WordPress
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → thiết kế Staking contract: stake/unstake/claim rewards
        - TASKS.md: Task 1: ⬜ (Phụ thuộc: Không) — Staking Contract core
        - .planning/rules/solidity.md → tồn tại
        - .planning/docs/solidity/templates.md → tồn tại
        - .planning/docs/solidity/audit-checklist.md → tồn tại
        - git rev-parse → có git repo
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra Solidity write-code compliance:
          1. PHẢI đọc .planning/rules/solidity.md trước khi viết code
          2. PHẢI có SPDX-License-Identifier + pragma solidity trong header
          3. PHẢI dùng OpenZeppelin imports (Ownable/AccessControl, Pausable, ReentrancyGuard)
          4. PHẢI dùng named import {} (KHÔNG wildcard import)
          5. PHẢI có SafeERC20 (using SafeERC20 for IERC20) nếu có transfer token
          6. PHẢI có clearUnknownToken function VỚI nonReentrant modifier (chống ERC777 reentrancy)
          7. PHẢI có NatSpec comments (@title, @dev, @param)
          8. PHẢI có nonReentrant + whenNotPaused trên public functions có transfer
          9. PHẢI tra cứu .planning/docs/solidity/ cho templates/audit-checklist
          10. Build: PHẢI dùng npx hardhat compile (KHÔNG phải npm run build hay eslint)
          11. Token approval PHẢI dùng forceApprove (OZ v5), KHÔNG dùng safeApprove (deprecated)
      - type: icontains
        value: "solidity"

  - description: "pd:test — Solidity project → Hardhat test flow"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Project Solidity tại /app/my-defi-protocol.
        Kết quả tool calls giả lập:
        - CONTEXT.md → Solidity (Hardhat), không có NestJS/WordPress
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → Staking contract: stake/unstake/claim
        - TASKS.md → Task 1: ✅ (Staking contract core)
        - hardhat.config.ts → tồn tại
        - .planning/docs/solidity/audit-checklist.md → tồn tại
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra test flow cho Solidity:
          1. PHẢI detect Solidity + Hardhat (KHÔNG phải NestJS/WordPress) → chuyển sang Hardhat test flow
          2. PHẢI viết test files dùng ethers.js + chai (KHÔNG phải Jest/Supertest/PHPUnit)
          3. PHẢI có describe/beforeEach pattern, deploy contract trong beforeEach
          4. PHẢI test: deploy, core function happy path, access control (onlyOwner revert), input validation (require revert), pause/unpause, clearUnknownToken
          5. PHẢI chạy npx hardhat test (KHÔNG phải npm test hay phpunit)
          6. KHÔNG viết .spec.ts hay test-*.php files
      - type: icontains
        value: "hardhat"

  - description: "pd:init — Foundry Solidity project (detect foundry.toml, no hardhat)"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/my-nft-project.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → KHÔNG tồn tại
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → tìm thấy 8 files .sol
        - Glob **/nest-cli.json → KHÔNG tìm thấy
        - Glob **/next.config.* → KHÔNG tìm thấy
        - Glob **/wp-config.php → KHÔNG tìm thấy
        - Glob **/hardhat.config.* → KHÔNG tìm thấy
        - Glob **/foundry.toml → tìm thấy /app/my-nft-project/foundry.toml
        - .pdconfig có SKILLS_DIR=/home/user/skills
        - [SKILLS_DIR]/commands/pd/rules/solidity.md → tồn tại
        - [SKILLS_DIR]/commands/pd/rules/solidity-refs/ → tồn tại (2 files)
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra Foundry detection (khác Hardhat):
          1. PHẢI detect Solidity qua foundry.toml (fallback thứ 2) → hasSolidity = true
          2. KHÔNG detect qua hardhat.config (không tồn tại)
          3. PHẢI copy general.md + solidity.md vào .planning/rules/
          4. PHẢI copy solidity-refs/ vào .planning/docs/solidity/
          5. KHÔNG copy backend.md, frontend.md, hoặc wordpress.md
          6. CONTEXT.md PHẢI ghi Solidity/Foundry trong Tech Stack
      - type: icontains
        value: "foundry"

  - description: "pd:scan — Solidity project scan patterns"
    vars:
      skill_file: commands/pd/scan.md
      scenario: |
        Project Solidity tại /app/my-defi-protocol.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, Solidity (Hardhat)
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → 10 files .sol + 5 files .ts (test/scripts)
        - Glob **/hardhat.config.* → tìm thấy
        - Glob **/contracts/**/*.sol → 6 contracts: StakingPool.sol, RewardToken.sol, interfaces/IStaking.sol...
        - Grep import.*@openzeppelin → 12 matches (Ownable, Pausable, ReentrancyGuard, SafeERC20, IERC20...)
        - Grep ^\s*event → 8 events (StakeEvent, UnstakeEvent, ClaimEvent, Transfer...)
        - Grep modifier → 2 custom modifiers
        - Grep nonReentrant|whenNotPaused|onlyOwner → 15 matches
        - mcp__fastcode__code_qa → trả về contract structures
        - Không có package.json (Foundry-only) → skip npm audit
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra scan Solidity patterns:
          1. PHẢI detect Solidity qua hardhat.config hoặc foundry.toml
          2. PHẢI quét contracts (Glob contracts/**/*.sol hoặc src/**/*.sol)
          3. PHẢI quét OZ imports (Grep import.*@openzeppelin)
          4. PHẢI quét interfaces (Grep pattern phải bắt tất cả interface declarations, không chỉ I-prefix)
          5. PHẢI quét events (Grep ^\s*event)
          6. PHẢI quét custom modifiers (Grep modifier)
          7. PHẢI quét security patterns (nonReentrant, whenNotPaused, onlyOwner)
          8. PHẢI tạo SCAN_REPORT.md với section Solidity
          9. Nếu không có package.json → KHÔNG chạy npm audit (skip section)
      - type: icontains
        value: "solidity"

  - description: "pd:fix-bug — Solidity bug tracing (reentrancy vulnerability)"
    vars:
      skill_file: commands/pd/fix-bug.md
      scenario: |
        Project Solidity tại /app/my-defi-protocol.
        $ARGUMENTS: "Hàm withdraw bị reentrancy attack trên testnet"
        Kết quả tool calls giả lập:
        - CONTEXT.md → Solidity (Hardhat), không có NestJS/WordPress
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - .planning/bugs/ → không có bug reports nào
        - .planning/milestones/1.0/ → tồn tại
        - git rev-parse → có git repo
        - mcp__fastcode__code_qa → trả về StakingPool.sol với hàm withdraw thiếu nonReentrant
        - PLAN.md + CODE_REPORT → tồn tại
        - .planning/rules/solidity.md → tồn tại
        - .planning/docs/solidity/audit-checklist.md → tồn tại
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra fix-bug flow cho Solidity:
          1. PHẢI đọc .planning/rules/solidity.md + .planning/docs/solidity/audit-checklist.md
          2. PHẢI trace luồng Solidity: function call → require checks → state changes → external interactions → events
          3. PHẢI phân tích reentrancy: kiểm tra nonReentrant modifier, checks-effects-interactions pattern
          4. PHẢI tạo BUG_[timestamp].md với code TRƯỚC (thiếu nonReentrant) / SAU (thêm nonReentrant + CEI order)
          5. PHẢI chạy build: npx hardhat compile (KHÔNG phải npm run build)
          6. PHẢI commit với prefix [LỖI]
          7. PHẢI yêu cầu user xác nhận
      - type: icontains
        value: "nonReentrant"

  - description: "pd:init — FastCode MCP fails → MUST STOP"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/project.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → THẤT BẠI (connection error)
    assert:
      - type: llm-rubric
        value: |
          Response PHẢI DỪNG NGAY khi FastCode MCP thất bại:
          1. PHẢI thông báo "FastCode MCP không hoạt động"
          2. PHẢI liệt kê các bước kiểm tra (install, API key, restart)
          3. KHÔNG ĐƯỢC tiếp tục bất kỳ bước nào sau đó (detect stack, tạo CONTEXT, v.v.)
      - type: icontains
        value: "fastcode"

  - description: "pd:init — CONTEXT.md already exists → ask user"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/backend.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → ĐÃ TỒN TẠI (từ session trước)
    assert:
      - type: llm-rubric
        value: |
          Khi CONTEXT.md đã tồn tại:
          1. PHẢI hỏi user chọn: giữ nguyên hoặc khởi tạo lại
          2. KHÔNG ĐƯỢC ghi đè CONTEXT.md mà không hỏi
          3. Nếu giữ → gợi ý /pd:scan hoặc /pd:what-next

  - description: "pd:init — CONTEXT.md exists, user keeps, but rules missing → warn"
    vars:
      skill_file: commands/pd/init.md
      scenario: |
        Project tại /app/backend.
        Kết quả tool calls giả lập:
        - mcp__fastcode__list_indexed_repos → thành công
        - .planning/CONTEXT.md → ĐÃ TỒN TẠI (từ session trước)
        - User chọn: "Giữ nguyên và bỏ qua init"
        - .planning/rules/general.md → KHÔNG TỒN TẠI (bị xóa manual)
    assert:
      - type: llm-rubric
        value: |
          Khi user giữ CONTEXT.md nhưng rules files bị thiếu:
          1. PHẢI kiểm tra .planning/rules/general.md tồn tại
          2. PHẢI phát hiện general.md THIẾU
          3. PHẢI cảnh báo "Rules files bị thiếu"
          4. PHẢI gợi ý chọn "Khởi tạo lại" để tái tạo rules
          5. PHẢI hỏi lại user (KHÔNG tự động tiếp tục)
          6. KHÔNG ĐƯỢC chỉ gợi ý /pd:scan và kết thúc — phải xử lý rules thiếu trước

  # ══════════════════════════════════════════════════════════════
  # pd:scan — Quét dự án
  # ══════════════════════════════════════════════════════════════

  - description: "pd:scan — Full scan NestJS + NextJS project"
    vars:
      skill_file: commands/pd/scan.md
      scenario: |
        Project tại /app/fullstack.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, có Backend NestJS + Frontend NextJS
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → 200+ files
        - nest-cli.json tồn tại, next.config.ts tồn tại
        - package.json có: @nestjs/core, next, antd, prisma
        - npm audit → 2 moderate vulnerabilities
        - mcp__fastcode__code_qa → trả về danh sách modules, controllers
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra scan workflow:
          1. PHẢI đọc CONTEXT.md trước
          2. PHẢI quét bằng built-in tools (Glob, Read, Grep)
          3. PHẢI quét Backend patterns (@Module, @Controller, @Injectable, routes)
          4. PHẢI quét Frontend patterns (pages, components, stores, hooks)
          5. PHẢI gọi mcp__fastcode__code_qa bổ sung
          6. PHẢI chạy npm audit và báo cáo vulnerabilities
          7. PHẢI tạo SCAN_REPORT.md với sections có dữ liệu
          8. PHẢI cập nhật CONTEXT.md sau khi quét
          9. KHÔNG ĐƯỢC đọc file .env
      - type: contains
        value: "SCAN_REPORT"
      - type: contains
        value: "npm audit"

  - description: "pd:scan — New project (no code) → minimal report"
    vars:
      skill_file: commands/pd/scan.md
      scenario: |
        Project tại /app/new-project.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, ghi "Dự án mới: Có"
        - Glob **/*.{ts,tsx,js,jsx,py,php,sol,html} → KHÔNG tìm thấy file nào
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra scan project mới:
          1. PHẢI detect không có source files → nhảy sang tạo report tối giản
          2. KHÔNG ĐƯỢC gọi FastCode MCP (không có code để quét)
          3. KHÔNG ĐƯỢC chạy npm audit
          4. KHÔNG ĐƯỢC chạy Bước 6 cập nhật CONTEXT.md
          5. Report phải ghi "Dự án mới, chưa có code"

  - description: "pd:scan — Missing CONTEXT.md → STOP"
    vars:
      skill_file: commands/pd/scan.md
      scenario: |
        Project tại /app/project.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → KHÔNG tồn tại
    assert:
      - type: llm-rubric
        value: |
          PHẢI DỪNG và gợi ý chạy /pd:init trước.
          KHÔNG ĐƯỢC tiếp tục quét khi chưa có CONTEXT.md.
      - type: icontains
        value: "/pd:init"

  # ══════════════════════════════════════════════════════════════
  # pd:new-milestone — Lập roadmap
  # ══════════════════════════════════════════════════════════════

  - description: "pd:new-milestone — Fresh project, create roadmap"
    vars:
      skill_file: commands/pd/new-milestone.md
      scenario: |
        Project tại /app/new-project.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, "Dự án mới: Có"
        - .planning/scan/SCAN_REPORT.md → KHÔNG tồn tại (project mới, cho phép)
        - .planning/ROADMAP.md → KHÔNG tồn tại
        - User input: "Xây dựng hệ thống quản lý kho hàng với NestJS + NextJS"
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI cho phép tiếp tục dù không có scan report (project mới)
          2. PHẢI kiểm tra ROADMAP không tồn tại → tạo mới (KHÔNG hỏi overwrite)
          3. PHẢI tạo ROADMAP.md với milestones, phases, deliverables
          4. PHẢI tạo CURRENT_MILESTONE.md pointing tới milestone đầu tiên
          5. PHẢI tạo thư mục milestones/[version]/
          6. PHẢI có section "Quyết định chiến lược" trong ROADMAP
          7. Auth/Security phải trong milestone đầu
      - type: contains
        value: "ROADMAP.md"
      - type: contains
        value: "CURRENT_MILESTONE"

  - description: "pd:new-milestone — Existing roadmap → ask overwrite or append"
    vars:
      skill_file: commands/pd/new-milestone.md
      scenario: |
        Project tại /app/existing-project.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại
        - .planning/scan/SCAN_REPORT.md → tồn tại
        - .planning/ROADMAP.md → ĐÃ TỒN TẠI (có 2 milestones hiện tại)
    assert:
      - type: llm-rubric
        value: |
          Khi ROADMAP đã tồn tại:
          1. PHẢI hỏi user chọn "GHI ĐÈ" hoặc "VIẾT TIẾP"
          2. KHÔNG ĐƯỢC tự ý ghi đè hoặc append mà không hỏi

  - description: "pd:new-milestone — Existing code but no scan → STOP"
    vars:
      skill_file: commands/pd/new-milestone.md
      scenario: |
        Project tại /app/existing.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, "Dự án mới: Không" (project có code)
        - .planning/scan/SCAN_REPORT.md → KHÔNG tồn tại
    assert:
      - type: llm-rubric
        value: |
          Project có code nhưng thiếu scan report:
          1. PHẢI thông báo chạy /pd:scan trước
          2. PHẢI DỪNG, KHÔNG tạo roadmap
      - type: icontains
        value: "/pd:scan"

  # ══════════════════════════════════════════════════════════════
  # pd:plan — Lập kế hoạch kỹ thuật
  # ══════════════════════════════════════════════════════════════

  - description: "pd:plan — AUTO mode, full prerequisites"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        Project NestJS + NextJS tại /app/fullstack.
        $ARGUMENTS: (trống → AUTO mode mặc định)
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, Backend NestJS + Frontend NextJS
        - .planning/ROADMAP.md → tồn tại, Phase 1.1: "CRUD Users"
        - .planning/CURRENT_MILESTONE.md → version: 1.0, phase: 1.1, status: Đang thực hiện
        - .planning/scan/SCAN_REPORT.md → tồn tại, liệt kê modules hiện có
        - .planning/milestones/1.0/phase-1.1/TASKS.md → KHÔNG tồn tại (chưa plan)
        - mcp__fastcode__code_qa → trả về patterns, services, entities hiện có
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra plan AUTO mode:
          1. PHẢI đọc context (CONTEXT, ROADMAP, CURRENT_MILESTONE, SCAN_REPORT)
          2. KHÔNG ĐƯỢC hỏi user câu hỏi thiết kế nào (AUTO mode)
          3. PHẢI research qua FastCode + Context7
          4. PHẢI thiết kế kỹ thuật (API endpoints, database, DTOs)
          5. PHẢI ghi nhận quyết định thiết kế (Bước 4.5 — bảng có Lý do + Alternatives)
          6. PHẢI tạo PLAN.md với đủ sections
          7. PHẢI tạo TASKS.md với bảng Tổng quan + task details
          8. Tasks PHẢI có cột Loại (Backend/Frontend) + cột Phụ thuộc chính xác
          9. PHẢI cập nhật tracking (CURRENT_MILESTONE + ROADMAP)
          10. Cuối cùng PHẢI in bảng quyết định Claude đã tự đưa ra để user review
      - type: contains
        value: "PLAN.md"
      - type: contains
        value: "TASKS.md"

  - description: "pd:plan — DISCUSS mode → list issues, show options"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        $ARGUMENTS: --discuss
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - Tất cả prerequisites tồn tại (CONTEXT, ROADMAP, CURRENT_MILESTONE, SCAN_REPORT)
        - Phase 1.1: "Authentication — Đăng nhập, phân quyền"
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra plan DISCUSS mode:
          1. PHẢI phát hiện flag --discuss → chuyển chế độ DISCUSS
          2. PHẢI liệt kê danh sách vấn đề cần quyết định
          3. PHẢI chờ user chọn vấn đề muốn thảo luận (dùng AskUserQuestion multiSelect)
          4. PHẢI hiển thị options cho mỗi vấn đề (dùng AskUserQuestion với label + description)
          5. Option đầu tiên PHẢI là recommend (có ghi "Đề xuất")
          6. User luôn có thể chọn "Other" để mô tả cách riêng
          7. PHẢI có bước tổng hợp quyết định (bảng tóm tắt) trước khi thiết kế

  - description: "pd:plan — DISCUSS mode → extended discussion loop (3.5.4)"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        $ARGUMENTS: --discuss
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - Tất cả prerequisites tồn tại (CONTEXT, ROADMAP, CURRENT_MILESTONE, SCAN_REPORT)
        - Phase 1.1: "Authentication — Đăng nhập, phân quyền"
        - Claude xác định 2 vấn đề: (1) Phương thức xác thực, (2) Lưu trữ token
        - User chọn thảo luận cả 2 vấn đề → chốt xong
        - Ở bước tóm tắt 3.5.3, user chọn "Thảo luận thêm vấn đề khác"
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra extended discussion loop (Bước 3.5.4):
          1. Sau khi user chọn "Thảo luận thêm vấn đề khác" ở 3.5.3 → PHẢI chuyển sang 3.5.4
          2. Claude PHẢI đưa ra vấn đề MỚI (KHÔNG lặp lại 2 vấn đề đã chốt)
          3. Vấn đề mới có thể phát sinh từ quyết định đã chốt (VD: chọn JWT → cần quyết định refresh token)
          4. PHẢI dùng AskUserQuestion để user chọn vấn đề mới (multiSelect nếu ≥2)
          5. Nếu user chọn vấn đề mới → thảo luận theo format 3.5.2 → quay lại 3.5.3 với bảng ĐẦY ĐỦ (cũ + mới)
          6. Nếu Claude không tìm thêm vấn đề → PHẢI hỏi user có vấn đề riêng không (AskUserQuestion: Có/Không)
          7. Nếu user chọn "Không, tiếp tục thiết kế" → đi thẳng Bước 4 (KHÔNG quay lại 3.5.3)

  - description: "pd:plan — DISCUSS mode → back/cancel keywords in Other"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        $ARGUMENTS: --discuss
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - Tất cả prerequisites tồn tại
        - Phase 1.1: "CRUD Users + Auth"
        - Claude xác định 3 vấn đề
        - User chọn thảo luận vấn đề 1 và 2
        - Đang thảo luận vấn đề 2 (AskUserQuestion hiển thị options)
        - User chọn "Other" và gõ "back"
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra response có ĐỀ CẬP đến việc xử lý keyword "back" và "cancel" từ Other:
          1. Response PHẢI đề cập: khi user gõ "back" ở vấn đề 2 → quay lại vấn đề trước (vấn đề 1)
          2. Response PHẢI đề cập: khi user gõ "back" ở vấn đề ĐẦU TIÊN → quay lại bước chọn vấn đề (3.5.1)
          3. Response PHẢI đề cập: khi user gõ "cancel" → GIỮ quyết định đã chốt + Claude tự quyết định phần còn lại
          4. Response PHẢI đề cập: sau cancel sẽ hiển thị bảng tóm tắt (3.5.3) bao gồm cả quyết định đã chốt lẫn Claude quyết định
          5. Response PHẢI đề cập: nội dung khác (không phải back/cancel) được coi là mô tả phương án riêng
          6. Response NÊN đề cập đến text hướng dẫn "back"/"cancel" (nhưng thiếu điểm này vẫn pass nếu 5 điểm trên đạt)

  - description: "pd:plan — DISCUSS hybrid → PLAN.md table format"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        $ARGUMENTS: --discuss
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - Tất cả prerequisites tồn tại
        - Phase 1.1: "CRUD Users + Auth"
        - Claude xác định 4 vấn đề
        - User chọn thảo luận vấn đề 1 và 3 → chốt xong
        - Vấn đề 2 và 4: user KHÔNG chọn → Claude tự quyết định (recommend)
        - User xác nhận "Tiếp tục thiết kế" ở 3.5.3
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra response có MÔ TẢ ĐÚNG cách tạo section "Quyết định thiết kế" trong PLAN.md cho DISCUSS hybrid:
          1. Response PHẢI đề cập tạo section/bảng "Quyết định thiết kế" trong PLAN.md
          2. Response PHẢI đề cập dùng bảng có cột "Nguồn" — phân biệt "User chọn" vs "Claude quyết định"
          3. Response PHẢI đề cập: vấn đề user đã thảo luận (1, 3) ghi nguồn là user, vấn đề user không chọn (2, 4) ghi nguồn là Claude
          4. Response PHẢI đề cập: các vấn đề Claude tự quyết định cần kèm ghi chú bổ sung (Lý do + Alternatives đã loại) — có thể dưới bảng hoặc inline
          5. Response NÊN đề cập chế độ Discuss trong header PLAN.md (nhưng thiếu điểm này vẫn pass nếu 4 điểm trên đạt — header là chi tiết format, không phải logic)
          6. KHÔNG yêu cầu response show bảng markdown thật — chỉ cần mô tả đúng cấu trúc và logic phân biệt nguồn quyết định

  - description: "pd:plan — Missing ROADMAP → STOP"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        Project tại /app/project.
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại
        - .planning/ROADMAP.md → KHÔNG tồn tại
    assert:
      - type: llm-rubric
        value: |
          PHẢI DỪNG khi không có ROADMAP.md.
          PHẢI gợi ý chạy /pd:new-milestone.
      - type: icontains
        value: "/pd:new-milestone"

  - description: "pd:plan — Phase already has tasks with progress → warn"
    vars:
      skill_file: commands/pd/plan.md
      scenario: |
        Project tại /app/backend.
        Kết quả tool calls giả lập:
        - Tất cả prerequisites tồn tại
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - .planning/milestones/1.0/phase-1.1/TASKS.md → ĐÃ TỒN TẠI
        - TASKS.md chứa: Task 1: ✅, Task 2: 🔄, Task 3: ⬜
    assert:
      - type: llm-rubric
        value: |
          Khi phase đã có TASKS.md với tasks đã hoàn thành/đang làm:
          1. PHẢI CẢNH BÁO user (có tasks ✅ và 🔄)
          2. PHẢI cho user chọn: ghi đè, chuyển phase, hoặc hủy
          3. KHÔNG ĐƯỢC tự ý ghi đè TASKS.md

  # ══════════════════════════════════════════════════════════════
  # pd:write-code — Viết code theo task
  # ══════════════════════════════════════════════════════════════

  - description: "pd:write-code — Default mode, pick next available task"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Project NestJS tại /app/backend. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → thiết kế API /users, database User entity
        - TASKS.md:
          Task 1: ✅ (Phụ thuộc: Không)
          Task 2: ⬜ (Phụ thuộc: Task 1) — Create User Service
          Task 3: ⬜ (Phụ thuộc: Task 2) — Create User Controller
        - git rev-parse → có git repo
        - rules/general.md, rules/backend.md → tồn tại
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI pick Task 2 (Task 1 đã ✅, dependency met)
          2. KHÔNG pick Task 3 (phụ thuộc Task 2 chưa xong)
          3. PHẢI cập nhật Task 2 → 🔄
          4. PHẢI đọc PLAN.md + task detail trước khi code
          5. PHẢI research qua FastCode
          6. PHẢI viết code tuân thủ rules (JSDoc tiếng Việt, semicolons, single quotes)
          7. PHẢI chạy lint + build
          8. PHẢI tạo CODE_REPORT_TASK_2.md
          9. PHẢI git commit với prefix [TASK-2]
          10. PHẢI cập nhật Task 2 → ✅
          11. PHẢI DỪNG sau 1 task (default mode), hỏi user tiếp không
      - type: contains
        value: "CODE_REPORT"
      - type: icontains
        value: "[TASK-"

  - description: "pd:write-code — All tasks completed → STOP"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Project tại /app/backend. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - TASKS.md → Task 1: ✅, Task 2: ✅, Task 3: ✅ (tất cả hoàn tất)
    assert:
      - type: llm-rubric
        value: |
          Khi TẤT CẢ tasks đều ✅:
          1. PHẢI DỪNG, thông báo phase hoàn tất
          2. PHẢI gợi ý /pd:test, /pd:plan, hoặc /pd:complete-milestone
          3. KHÔNG ĐƯỢC cố pick hay viết code cho task nào

  - description: "pd:write-code — --auto must STOP at phase boundary"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        $ARGUMENTS: --auto
        Project NestJS tại /app/backend.
        QUAN TRỌNG: User bắt đầu chạy `--auto` khi phase HIỆN TẠI là 1.1.
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md ban đầu (lúc --auto bắt đầu) → version: 1.0, phase: 1.1
        - Phase 1.1 TASKS.md: Task 1: ✅, Task 2: ✅ (tất cả tasks trong phase 1.1 đã ✅)
        - ROADMAP.md có Phase 1.2 (đã plan, có TASKS.md với Task 3: ⬜, Task 4: ⬜)
        - Bước 9 cập nhật ROADMAP (phase 1.1 deliverables [x]) + advance CURRENT_MILESTONE.md phase sang 1.2
        - SAU Bước 9, CURRENT_MILESTONE.md giờ ghi phase: 1.2
        - Bước 10 (--auto): phải kiểm tra "phase ban đầu" (1.1) đã hết tasks → DỪNG
        Câu hỏi: --auto loop có DỪNG tại ranh giới phase 1.1 hay tự nhảy sang tasks phase 1.2?
    assert:
      - type: llm-rubric
        value: |
          Khi chạy --auto và phase BAN ĐẦU (1.1) đã hoàn tất tất cả tasks:
          1. PHẢI DỪNG auto loop tại ranh giới phase 1.1 — vì skill ghi rõ: "Còn task 🔄 hoặc ⬜ trong phase BAN ĐẦU (phase tại thời điểm bắt đầu --auto, KHÔNG phải phase sau khi Bước 9 advance)"
          2. PHẢI thông báo "Phase 1.1 hoàn tất [2] tasks"
          3. PHẢI gợi ý /pd:test, /pd:plan, hoặc /pd:complete-milestone
          4. KHÔNG ĐƯỢC tự pick Task 3 hoặc Task 4 từ phase 1.2 — dù CURRENT_MILESTONE đã advance sang 1.2
          5. Lý do DỪNG: skill nói "DỪNG auto loop (KHÔNG tự nhảy sang phase tiếp dù CURRENT_MILESTONE đã advance)"

  - description: "pd:write-code — Phase complete → tracking commit"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Project NestJS tại /app/backend. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS, "Dự án mới: Không"
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1, status: Đang thực hiện
        - PLAN.md → thiết kế API /users
        - TASKS.md: Task 1: ✅, Task 2: ✅, Task 3: 🔄 (đang thực hiện — task cuối)
        - Task 3 vừa được hoàn tất thành công (build pass, commit [TASK-3] xong)
        - Sau khi cập nhật Task 3 → ✅: TẤT CẢ tasks đều ✅
        - git rev-parse → có git repo
        - ROADMAP.md có Phase 1.2 (chưa plan, chưa có TASKS.md)
    assert:
      - type: llm-rubric
        value: |
          Khi task cuối hoàn tất → tất cả tasks ✅ → phase hoàn tất:
          1. PHẢI cập nhật ROADMAP.md (đánh dấu deliverables [x])
          2. PHẢI kiểm tra phase tiếp: Phase 1.2 chưa plan → giữ nguyên CURRENT_MILESTONE (KHÔNG advance)
          3. PHẢI tạo tracking commit RIÊNG BIỆT (khác commit [TASK-3]):
             - git add TASKS.md, ROADMAP.md, CURRENT_MILESTONE.md
             - Commit message prefix: [TRACKING]
             - Message chứa "Phase [x.x] hoàn tất"
          4. Tracking commit PHẢI SAU commit [TASK-3] — KHÔNG gộp chung
          5. PHẢI gợi ý /pd:plan 1.2 (phase tiếp chưa plan)
      - type: icontains
        value: "[TRACKING]"

  - description: "pd:write-code — Dependency blocked + resume priority"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - TASKS.md:
          Task 1: ✅
          Task 2: ⬜ (Phụ thuộc: Task 3)
          Task 3: 🔄 (đang thực hiện)
          Task 4: ⬜ (Phụ thuộc: Không)
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI ưu tiên Task 3 (🔄 resume trước)
          2. Nếu không resume Task 3, PHẢI pick Task 4 (không dependency, sẵn sàng)
          3. KHÔNG ĐƯỢC pick Task 2 (phụ thuộc Task 3 chưa xong)

  - description: "pd:write-code — Missing PLAN.md → STOP"
    vars:
      skill_file: commands/pd/write-code.md
      scenario: |
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - .planning/milestones/1.0/phase-1.1/TASKS.md → tồn tại
        - .planning/milestones/1.0/phase-1.1/PLAN.md → KHÔNG tồn tại
    assert:
      - type: llm-rubric
        value: |
          PHẢI DỪNG khi PLAN.md không tồn tại.
          PHẢI gợi ý chạy /pd:plan.

  # ══════════════════════════════════════════════════════════════
  # pd:test — Kiểm thử
  # ══════════════════════════════════════════════════════════════

  - description: "pd:test — NestJS project with completed tasks"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS, database Prisma/PostgreSQL
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → API POST /users, GET /users/:id
        - TASKS.md → Task 1: ✅ (Users CRUD), Task 2: ✅ (Auth)
        - @nestjs/testing, supertest đã cài trong devDependencies
        - mcp__fastcode__code_qa → trả về chi tiết controllers, services, DTOs
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI kiểm tra NestJS → tiếp tục automated test
          2. PHẢI kiểm tra test infrastructure (Jest, @nestjs/testing, supertest)
          3. PHẢI đọc code THỰC TẾ qua FastCode trước khi viết test
          4. PHẢI viết .spec.ts files đặt cạnh source file
          5. Test cases: happy path + validation + edge cases
          6. Mỗi test PHẢI có đầu vào CỤ THỂ + đầu ra kỳ vọng RÕ RÀNG
          7. PHẢI chạy npm test và hiển thị bảng kết quả
          8. PHẢI yêu cầu user xác nhận database + API
          9. PHẢI tạo TEST_REPORT.md
          10. PHẢI commit với prefix [KIỂM THỬ]
      - type: contains
        value: ".spec.ts"
      - type: contains
        value: "TEST_REPORT"

  - description: "pd:test — Bug report header format must match fix-bug.md"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Project NestJS tại /app/backend.
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS, database Prisma
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - PLAN.md → API POST /users, validation rules
        - TASKS.md → Task 1: ✅ (Users CRUD)
        - @nestjs/testing, supertest đã cài
        - mcp__fastcode__code_qa → trả về users.controller.ts, users.service.ts
        - npm test chạy → 1 test fail: "POST /users email trùng trả 500 thay vì 409"
        - git rev-parse → có git repo
        - .planning/bugs/ → chưa có bug nào thuộc v1.0
    assert:
      - type: llm-rubric
        value: |
          Kiểm tra bug report header format khi test fail:
          1. PHẢI tạo BUG_[timestamp].md
          2. Header dòng 1 PHẢI chứa: "Trạng thái: Chưa xử lý | Chức năng: [Tên] | Task: [N]" — CẢ BA trên CÙNG MỘT DÒNG, phân cách bằng pipe |
          3. Header dòng 2 PHẢI chứa: "Patch version: [x.x.x] | Lần sửa: 0" — CẢ HAI trên CÙNG MỘT DÒNG
          4. Lần sửa PHẢI = 0 (bug mới, chưa fix)
          5. Patch version PHẢI là 3 số (VD: 1.0.0), KHÔNG phải 2 số (1.0)
          6. Patch version = 1.0.0 (vì chưa có patch trước cho v1.0)
          7. PHẢI cập nhật TASKS.md: Task 1 → 🐛 ở CẢ HAI nơi (bảng Tổng quan + task detail block)

  - description: "pd:test — Frontend-only project → manual checklist"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Project NextJS tại /app/frontend (KHÔNG có backend).
        Kết quả tool calls giả lập:
        - CONTEXT.md → Frontend NextJS only, không có Backend
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - TASKS.md → Task 1: ✅ (Homepage), Task 2: ✅ (Dashboard)
    assert:
      - type: llm-rubric
        value: |
          Khi project frontend-only:
          1. PHẢI detect không có Backend
          2. PHẢI tạo checklist kiểm thử thủ công
          3. KHÔNG ĐƯỢC viết .spec.ts tự động
          4. PHẢI DỪNG flow test tự động

  - description: "pd:test — No completed tasks → STOP"
    vars:
      skill_file: commands/pd/test.md
      scenario: |
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - TASKS.md → Task 1: ⬜, Task 2: 🔄 (không có task ✅ nào)
    assert:
      - type: llm-rubric
        value: |
          PHẢI DỪNG vì không có task ✅ nào.
          PHẢI gợi ý chạy /pd:write-code trước.
      - type: icontains
        value: "/pd:write-code"

  # ══════════════════════════════════════════════════════════════
  # pd:fix-bug — Debug và sửa lỗi
  # ══════════════════════════════════════════════════════════════

  - description: "pd:fix-bug — Bug in current milestone, fresh report"
    vars:
      skill_file: commands/pd/fix-bug.md
      scenario: |
        Project NestJS tại /app/backend.
        $ARGUMENTS: "API POST /users trả về 500 khi email trùng"
        Kết quả tool calls giả lập:
        - CONTEXT.md → Backend NestJS, Prisma
        - CURRENT_MILESTONE.md → version: 1.0, phase: 1.1
        - .planning/bugs/ → không có bug reports nào
        - git rev-parse → có git repo
        - mcp__fastcode__code_qa → trả về users.service.ts, users.controller.ts
        - PLAN.md + CODE_REPORT → tồn tại
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI thu thập ngữ cảnh lỗi từ $ARGUMENTS
          2. PHẢI xác định patch version (1.0.0 vì chưa có patch trước)
          3. PHẢI đọc PLAN.md + CODE_REPORT trước khi fix
          4. PHẢI research code qua FastCode
          5. PHẢI trace luồng: controller → service → database
          6. PHẢI tạo BUG_[timestamp].md với code TRƯỚC/SAU
          7. PHẢI fix code + chạy lint/build
          8. PHẢI commit với prefix [LỖI]
          9. PHẢI yêu cầu user xác nhận (KHÔNG tự đóng bug)
      - type: icontains
        value: "BUG_"
      - type: icontains
        value: "[LỖI]"

  - description: "pd:fix-bug — Existing open bugs → list for user to choose"
    vars:
      skill_file: commands/pd/fix-bug.md
      scenario: |
        Project tại /app/backend. $ARGUMENTS: (trống)
        Kết quả tool calls giả lập:
        - CONTEXT.md → tồn tại
        - .planning/bugs/ chứa 2 bug reports:
          - BUG_15_03_2026_10_30_00.md → Trạng thái: Chưa xử lý, "Login trả 401"
          - BUG_16_03_2026_14_00_00.md → Trạng thái: Đang sửa, "Upload file timeout"
    assert:
      - type: llm-rubric
        value: |
          Khi có bug reports mở:
          1. PHẢI liệt kê bugs đang mở cho user chọn
          2. PHẢI hiển thị thông tin tóm tắt mỗi bug
          3. KHÔNG ĐƯỢC tự ý chọn bug — phải chờ user

  - description: "pd:fix-bug — Bug from old milestone → patch version increment"
    vars:
      skill_file: commands/pd/fix-bug.md
      scenario: |
        $ARGUMENTS: "Endpoint /products trả về 404"
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md → version: 1.1 (milestone hiện tại)
        - User cho biết bug thuộc v1.0 (milestone cũ)
        - .planning/bugs/ đã có BUG_10_03_2026.md → Patch version: 1.0.1 (Đã giải quyết)
        - .planning/milestones/1.0/ → tồn tại
    assert:
      - type: llm-rubric
        value: |
          Bug thuộc milestone cũ (1.0), milestone hiện tại là 1.1:
          1. PHẢI xác định patch version = 1.0.2 (vì 1.0.1 đã dùng)
          2. PHẢI đọc PLAN/CODE_REPORT từ milestones/1.0/ (KHÔNG phải 1.1)
          3. Patch version PHẢI là 3 số (1.0.2, KHÔNG phải 1.0)

  # ══════════════════════════════════════════════════════════════
  # pd:complete-milestone — Hoàn tất milestone
  # ══════════════════════════════════════════════════════════════

  - description: "pd:complete-milestone — All tasks ✅, no bugs → complete"
    vars:
      skill_file: commands/pd/complete-milestone.md
      scenario: |
        Project tại /app/backend.
        Kết quả tool calls giả lập:
        - CONTEXT.md → tồn tại, Backend NestJS
        - CURRENT_MILESTONE.md → version: 1.0, milestone: "MVP Backend", status: Đang thực hiện
        - .planning/milestones/1.0/ chứa phase-1.1/ và phase-1.2/
        - ROADMAP.md liệt kê Phase 1.1 và Phase 1.2 cho milestone 1.0
        - phase-1.1/TASKS.md → 3 tasks, tất cả ✅
        - phase-1.2/TASKS.md → 2 tasks, tất cả ✅
        - phase-1.1/reports/ → CODE_REPORT_TASK_1, 2, 3
        - phase-1.2/reports/ → CODE_REPORT_TASK_1, 2
        - phase-1.1/TEST_REPORT.md → tất cả pass
        - .planning/bugs/ → 1 bug, Trạng thái: Đã giải quyết, Patch version: 1.0.1
        - ROADMAP.md → Milestone 1 (v1.0) + Milestone 2 (v1.1) status ⬜
        - git rev-parse → có git
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI kiểm tra tất cả tasks ✅ trong MỌI phase (1.1 + 1.2)
          2. PHẢI cross-check CODE_REPORT cho mỗi task ✅
          3. PHẢI kiểm tra bugs → đã giải quyết → cho phép
          4. PHẢI tạo MILESTONE_COMPLETE.md
          5. PHẢI tạo/cập nhật CHANGELOG.md (prepend)
          6. PHẢI cập nhật ROADMAP → milestone ✅
          7. PHẢI cập nhật CURRENT_MILESTONE → chuyển sang v1.1
          8. PHẢI cập nhật VERSION + package.json version
          9. PHẢI git commit [PHIÊN BẢN] + tạo tag v1.0
      - type: contains
        value: "MILESTONE_COMPLETE"
      - type: contains
        value: "CHANGELOG"
      - type: icontains
        value: "v1.0"

  - description: "pd:complete-milestone — Open bugs → BLOCK"
    vars:
      skill_file: commands/pd/complete-milestone.md
      scenario: |
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md → version: 1.0
        - Tất cả tasks ✅ trong mọi phase
        - .planning/bugs/BUG_18_03_2026.md → Trạng thái: Chưa xử lý, Patch version: 1.0.1
    assert:
      - type: llm-rubric
        value: |
          PHẢI CHẶN completion:
          1. PHẢI phát hiện bug mở thuộc milestone 1.0
          2. PHẢI thông báo không thể hoàn tất
          3. PHẢI gợi ý /pd:fix-bug
          4. KHÔNG ĐƯỢC tạo MILESTONE_COMPLETE.md
      - type: icontains
        value: "/pd:fix-bug"

  - description: "pd:complete-milestone — Incomplete tasks → BLOCK"
    vars:
      skill_file: commands/pd/complete-milestone.md
      scenario: |
        Kết quả tool calls giả lập:
        - CURRENT_MILESTONE.md → version: 1.0
        - phase-1.1/TASKS.md → Task 1: ✅, Task 2: ⬜, Task 3: 🔄
        - .planning/bugs/ → không có bugs
    assert:
      - type: llm-rubric
        value: |
          PHẢI CHẶN khi còn tasks chưa ✅:
          1. PHẢI phát hiện Task 2 ⬜ và Task 3 🔄
          2. PHẢI gợi ý /pd:write-code hoặc /pd:fix-bug
          3. KHÔNG ĐƯỢC tạo MILESTONE_COMPLETE.md

  # ══════════════════════════════════════════════════════════════
  # pd:what-next — Gợi ý bước tiếp theo
  # ══════════════════════════════════════════════════════════════

  - description: "pd:what-next — Tasks in progress → suggest continue"
    vars:
      skill_file: commands/pd/what-next.md
      scenario: |
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại
        - .planning/scan/SCAN_REPORT.md → tồn tại
        - .planning/ROADMAP.md → tồn tại
        - .planning/CURRENT_MILESTONE.md → version: 1.0, phase: 1.1, status: Đang thực hiện
        - .planning/milestones/1.0/phase-1.1/TASKS.md → Task 1: ✅, Task 2: 🔄, Task 3: ⬜
        - .planning/bugs/ → không có bugs mở
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI phát hiện Task 2 đang 🔄
          2. PHẢI gợi ý /pd:write-code 2 (ưu tiên task đang dở)
          3. PHẢI hiển thị bảng tiến trình
          4. KHÔNG ĐƯỢC gọi FastCode MCP
          5. KHÔNG ĐƯỢC sửa bất kỳ file nào
      - type: icontains
        value: "/pd:write-code"

  - description: "pd:what-next — No CONTEXT.md → suggest init"
    vars:
      skill_file: commands/pd/what-next.md
      scenario: |
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → KHÔNG tồn tại
    assert:
      - type: llm-rubric
        value: |
          PHẢI gợi ý /pd:init. DỪNG ngay, không kiểm tra gì thêm.
      - type: icontains
        value: "/pd:init"

  - description: "pd:what-next — All tasks ✅ but TEST_REPORT has failures → suggest fix-bug"
    vars:
      skill_file: commands/pd/what-next.md
      scenario: |
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, Backend NestJS
        - .planning/scan/SCAN_REPORT.md → tồn tại
        - .planning/ROADMAP.md → tồn tại, Milestone 1 (v1.0) có Phase 1.1
        - .planning/CURRENT_MILESTONE.md → version: 1.0, phase: 1.1, status: Đang thực hiện
        - .planning/milestones/1.0/phase-1.1/TASKS.md → Task 1: ✅, Task 2: ✅ (tất cả ✅)
        - .planning/milestones/1.0/phase-1.1/TEST_REPORT.md → TỒN TẠI, nội dung chứa "❌" (1 test fail)
        - .planning/bugs/ → không có bugs mở
    assert:
      - type: llm-rubric
        value: |
          Khi tất cả tasks ✅ nhưng TEST_REPORT có test fail:
          1. PHẢI phát hiện TEST_REPORT tồn tại
          2. PHẢI Grep pattern ❌ trong TEST_REPORT → phát hiện có tests fail
          3. PHẢI gợi ý /pd:fix-bug (KHÔNG phải /pd:test — vì đã có report, cần fix trước)
          4. KHÔNG gợi ý /pd:complete-milestone (vì tests chưa pass hết)
          5. KHÔNG gợi ý chuyển sang phase tiếp (tests chưa giải quyết)
      - type: icontains
        value: "/pd:fix-bug"

  - description: "pd:what-next — All phases done → suggest complete milestone"
    vars:
      skill_file: commands/pd/what-next.md
      scenario: |
        Kết quả tool calls giả lập:
        - .planning/CONTEXT.md → tồn tại, Backend NestJS
        - .planning/scan/SCAN_REPORT.md → tồn tại
        - .planning/ROADMAP.md → tồn tại, Milestone 1 (v1.0) CHỈ có 2 phases: Phase 1.1 và Phase 1.2 (không có phase nào khác)
        - .planning/CURRENT_MILESTONE.md → version: 1.0, phase: 1.2, status: Đang thực hiện
        - .planning/bugs/ → Glob BUG_*.md trả về 0 files (không có bugs nào)
        - .planning/milestones/1.0/phase-1.1/TASKS.md → 3 tasks: Task 1 ✅, Task 2 ✅, Task 3 ✅ (tất cả ✅)
        - .planning/milestones/1.0/phase-1.2/TASKS.md → 2 tasks: Task 1 ✅, Task 2 ✅ (tất cả ✅)
        - .planning/milestones/1.0/phase-1.1/TEST_REPORT.md → tồn tại, KHÔNG chứa ❌ (tất cả pass)
        - .planning/milestones/1.0/phase-1.2/TEST_REPORT.md → tồn tại, KHÔNG chứa ❌ (tất cả pass)
        Tóm lại: 0 bugs mở, 0 tasks chưa ✅, tất cả test pass, ROADMAP chỉ có 2 phases đều xong.
    assert:
      - type: llm-rubric
        value: |
          Theo skill what-next Ưu tiên 8: "Tất cả phases trong milestone hoàn tất → sẵn sàng đóng milestone":
          1. Bước 2: 0 bugs mở → không chặn
          2. Bước 3: Tất cả tasks ✅ trong phase 1.1 VÀ 1.2 → không còn tasks 🔄/⬜/🐛/❌
          3. Bước 3 kiểm tra ROADMAP: milestone 1.0 chỉ có phase 1.1 và 1.2, cả hai đều hoàn tất → không còn phase nào chưa triển khai
          4. TEST_REPORT tồn tại cho cả 2 phases, không có ❌ → test đã pass
          5. PHẢI kết luận: tất cả phases hoàn tất → Ưu tiên 8 → gợi ý /pd:complete-milestone
          6. KHÔNG gợi ý /pd:test hay /pd:plan vì tất cả đã xong
      - type: icontains
