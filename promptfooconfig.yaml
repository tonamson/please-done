  # ══════════════════════════════════════════════════════════════

  - description: "pd:update — Remote version newer → show changelog, ask user"
    vars:
      skill_file: commands/pd/update.md
      scenario: |
        $ARGUMENTS: (trống → check mode)
        Kết quả tool calls giả lập:
        - .pdconfig → SKILLS_DIR=/home/user/skills
        - VERSION file → 2.0.0
        - git fetch origin main → thành công
        - git show origin/main:VERSION → 2.1.0
        - CHANGELOG.md remote → có entries mới cho v2.1.0 và v2.0.1
    assert:
      - type: llm-rubric
        value: |
          1. PHẢI đọc LOCAL_VERSION = 2.0.0
          2. PHẢI fetch remote → REMOTE_VERSION = 2.1.0
          3. PHẢI detect remote mới hơn
          4. PHẢI hiển thị changelog (chỉ entries mới hơn 2.0.0)
          5. PHẢI hỏi user muốn cập nhật không (check mode, KHÔNG tự update)
          6. KHÔNG ĐƯỢC tự cập nhật khi không có --apply

