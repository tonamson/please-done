      description: "SHA256 for password — too fast, easy to brute-force"
      stack: [js, ts, py, php]
    - regex: 'Math\.random\(\)'
      description: "JS Math.random() — not cryptographic"
      stack: [js, ts]
    - regex: 'random\.random\(\)|random\.randint\('
      description: "Python non-crypto random"
      stack: [py]
    - regex: 'rand\(\)|mt_rand\('
      description: "PHP non-crypto random"
      stack: [php]
    - regex: 'java\.util\.Random'
      description: "Java non-crypto Random (needs SecureRandom)"
      stack: [java]
    - regex: 'createCipheriv\([''"]des[''"]\)'
      description: "DES — 56-bit, broken"
      stack: [js, ts]
    - regex: 'createCipheriv\([''"]des-ede3[''"]\)'
      description: "3DES — deprecated, slow"
      stack: [js, ts]
    - regex: 'createCipheriv\([''"]rc4[''"]\)'
      description: "RC4 — broken"
      stack: [js, ts]
    - regex: 'createCipheriv\([''"]aes-\d+-ecb[''"]\)'
      description: "AES-ECB — no IV, pattern leaking"
      stack: [js, ts]
    - regex: 'localStorage\.setItem\(.*token'
      description: "Token stored in localStorage — XSS can steal it"
      stack: [js, ts]
    - regex: 'localStorage\.setItem\(.*password'
      description: "Password stored in localStorage"
      stack: [js, ts]
    - regex: 'rejectUnauthorized:\s*false'
      description: "Disable TLS verification — MITM attack"
      stack: [js, ts]
    - regex: 'verify\s*=\s*False'
      description: "Python requests verify=False — disables SSL"
      stack: [py]
    - regex: 'ssl\.PROTOCOL_TLSv1\b'
      description: "Python TLS 1.0 — deprecated"
      stack: [py]
    - regex: 'SSLv3'
      description: "SSLv3 — POODLE attack"
      stack: [js, ts, py, php, java]
    - regex: 'Buffer\.alloc\(16\)'
      description: "Zero IV — check if used before createCipheriv"
      stack: [js, ts]
  fixes:
    - pattern: "Weak hash algorithm"
      fix: "Use SHA-256/SHA-3 for checksums. For passwords: bcrypt (cost ≥ 10), argon2id, scrypt, PBKDF2 (iterations ≥ 100000)"
    - pattern: "Weak PRNG"
      fix: "Use crypto.randomBytes (Node.js), os.urandom (Python), SecureRandom (Java) for token/OTP/session"
    - pattern: "Weak encryption"
      fix: "Use AES-256-GCM or ChaCha20-Poly1305. Do not use DES/RC4/ECB"
    - pattern: "TLS disabled"
      fix: "Never disable TLS verification in production. Use TLS 1.2+ with strong cipher suites"
    - pattern: "Static IV/Nonce"
      fix: "Always generate random IV/nonce using crypto.randomBytes() for each encryption"
  fastcode_queries:
    - "Are variables being hashed in files passwords/tokens?"
    - "Is Math.random() in the project used for security purposes?"
    - "Find all places using crypto/hash functions and their purposes"

insecure-design:
