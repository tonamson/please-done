      description: "Login endpoint — needs rate limiting"
      stack: [js, ts, py, php, java]
    - regex: 'POST.*/register|signup'
      description: "Register endpoint — needs rate limiting"
      stack: [js, ts, py, php, java]
    - regex: 'POST.*/forgot-password|reset-password'
      description: "Password reset — needs rate limiting"
      stack: [js, ts, py, php, java]
    - regex: 'POST.*/otp|verify|2fa'
      description: "OTP verification — brute-force 6 digits = 1M attempts"
      stack: [js, ts, py, php, java]
    - regex: 'POST.*/transfer|withdraw|payment'
      description: "Financial transaction — needs rate limiting and transaction"
      stack: [js, ts, py, php, java]
    - regex: 'maxFileSize|limits|fileSize|MAX_FILE_SIZE'
      description: "Upload limit — check if limit exists"
      stack: [js, ts, py, php, java]
    - regex: 'sendMail|sendSms|sendNotification'
      description: "Sending email/SMS — needs rate limiting to prevent abuse"
      stack: [js, ts, py, php, java]
    - regex: 'status\s*=\s*[''"]'
      description: "Direct status assignment — check state machine validation"
      stack: [js, ts, py, php, java]
  fixes:
    - pattern: "Race condition"
      fix: "Use database transaction + SELECT FOR UPDATE, or distributed lock (Redis/Redlock)"
    - pattern: "Business logic bypass"
      fix: "Calculate price/total server-side from database, validate state before transition"
    - pattern: "Missing rate limiting"
      fix: "Add rate limiter (express-rate-limit, @nestjs/throttler) to sensitive endpoints"
    - pattern: "Missing abuse case"
      fix: "Limit upload size, bulk operations, pagination, email sending frequency"
    - pattern: "State transition"
      fix: "Use state machine pattern, enum for states, validate previous state before transition"
  fastcode_queries:
    - "Which endpoints have rate limiting middleware?"
    - "Which functions use database transactions?"
    - "Is price/amount/total recalculated server-side or taken from client?"

