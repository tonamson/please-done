# security-rules.yaml — Nguồn sự thật duy nhất cho 13 OWASP scanner categories
# Migrate từ 13 file pd-sec-*.md riêng lẻ thành 1 file YAML tập trung.
# Mỗi category chứa: owasp, severity, evidence_file, patterns[], fixes[], fastcode_queries[]

sql-injection:
  owasp: "A03:2021 Injection"
  severity: critical
  evidence_file: evidence_sec_sqli.md
  patterns:
    - regex: 'query\(.*\+'
      description: "Raw SQL nối chuỗi bằng toán tử +"
      stack: [js, ts, php, py]
    - regex: 'query\(.*\$\{'
      description: "Template literal trong SQL query"
      stack: [js, ts]
    - regex: '"SELECT.*" \+'
      description: "Câu SELECT nối chuỗi với dấu +"
      stack: [js, ts, php, py]
    - regex: "'SELECT.*' \\+"
      description: "Câu SELECT (dấu nháy đơn) nối chuỗi"
      stack: [js, ts, php, py]
    - regex: '`SELECT.*\$\{'
      description: "Template literal chứa SELECT"
      stack: [js, ts]
    - regex: '`INSERT.*\$\{'
      description: "Template literal chứa INSERT"
      stack: [js, ts]
    - regex: '`UPDATE.*\$\{'
      description: "Template literal chứa UPDATE"
      stack: [js, ts]
    - regex: '`DELETE.*\$\{'
      description: "Template literal chứa DELETE"
      stack: [js, ts]
    - regex: 'sequelize\.query\('
      description: "Sequelize raw query mode"
      stack: [js, ts]
    - regex: '\$queryRaw'
      description: "Prisma raw query"
      stack: [js, ts]
    - regex: '\$executeRaw'
      description: "Prisma raw execute"
      stack: [js, ts]
    - regex: 'raw\('
      description: "ORM raw query function"
      stack: [js, ts, py]
    - regex: 'textual\('
      description: "SQLAlchemy textual query"
      stack: [py]
    - regex: 'connection\.query\(.*req\.(body|params|query)'
      description: "User input đi thẳng vào connection.query()"
      stack: [js, ts]
    - regex: '\$wpdb->(query|get_row|get_results|get_var)\('
      description: "WordPress wpdb query không có prepare"
      stack: [php]
    - regex: '\$where'
      description: "MongoDB $where — JavaScript execution trong query"
      stack: [js, ts]
    - regex: '\.(find|findOne|updateOne|deleteOne)\(.*req\.(body|params|query)'
      description: "User input trực tiếp vào MongoDB query"
      stack: [js, ts]
    - regex: '\$gt|\$gte|\$lt|\$lte|\$ne|\$in|\$regex'
      description: "MongoDB operator injection qua JSON body"
      stack: [js, ts]
    - regex: 'collection\.aggregate\(.*req\.body'
      description: "MongoDB pipeline injection"
      stack: [js, ts]
    - regex: 'knex\.raw\(.*\$\{'
      description: "Template literal trong Knex raw query"
      stack: [js, ts]
    - regex: '\.whereRaw\(.*\+'
      description: "Knex whereRaw với nối chuỗi"
      stack: [js, ts]
    - regex: '\.orderByRaw\(.*req\.'
      description: "Knex orderByRaw injection"
      stack: [js, ts]
    - regex: 'cursor\.execute\(f[''"]'
      description: "Python f-string trong cursor.execute"
      stack: [py]
    - regex: 'cursor\.execute\(.*\.format\('
      description: "Python str.format trong SQL"
      stack: [py]
    - regex: 'cursor\.execute\(.*%.*%'
      description: "Python old-style format trong SQL"
      stack: [py]
  fixes:
    - pattern: "Raw SQL nối chuỗi"
      fix: "Dùng parameterized query hoặc prepared statement thay vì nối chuỗi"
    - pattern: "ORM raw mode"
      fix: "Dùng ORM query builder (TypeORM .where(), Prisma .findMany(), Sequelize .findAll())"
    - pattern: "WordPress wpdb"
      fix: "Dùng $wpdb->prepare() với placeholder %s, %d"
    - pattern: "MongoDB injection"
      fix: "Validate input type trước khi truyền vào query, dùng mongoose schema validation"
    - pattern: "Knex raw"
      fix: "Dùng Knex query builder thay vì .raw(), hoặc dùng bindings: knex.raw('? = ?', [val1, val2])"
    - pattern: "Python f-string SQL"
      fix: "Dùng parameterized query: cursor.execute('SELECT * FROM t WHERE id = %s', (id,))"
    - pattern: "Second-order SQLi"
      fix: "Parameterize cả query dùng dữ liệu từ DB — dữ liệu DB không đáng tin nếu user có thể insert"
  fastcode_queries:
    - "Biến nào trong dự án được truyền trực tiếp vào SQL query mà không qua parameterize?"
    - "Liệt kê tất cả nơi import/sử dụng raw query trong dự án"
    - "Tìm tất cả endpoint nhận user input và truyền vào database query"

xss:
  owasp: "A03:2021 Injection"
  severity: high
  evidence_file: evidence_sec_xss.md
  patterns:
    - regex: 'innerHTML\s*='
      description: "Gán innerHTML trực tiếp — DOM XSS vector"
      stack: [js, ts, jsx, tsx]
    - regex: 'outerHTML\s*='
      description: "Gán outerHTML trực tiếp"
      stack: [js, ts]
    - regex: 'document\.write\('
      description: "document.write — ghi HTML không qua encode"
      stack: [js, ts]
    - regex: 'document\.writeln\('
      description: "document.writeln — ghi HTML không qua encode"
      stack: [js, ts]
    - regex: '\.insertAdjacentHTML\('
      description: "insertAdjacentHTML — chèn HTML thô"
      stack: [js, ts]
    - regex: 'dangerouslySetInnerHTML'
      description: "React dangerouslySetInnerHTML — bypass auto-escape"
      stack: [jsx, tsx]
    - regex: 'v-html'
      description: "Vue v-html — render HTML thô"
      stack: [vue]
    - regex: '\[innerHTML\]'
      description: "Angular innerHTML binding"
      stack: [ts]
    - regex: '\{@html'
      description: "Svelte @html — render HTML thô"
      stack: [svelte]
    - regex: '\|safe'
      description: "Jinja2 |safe filter — bỏ qua auto-escape"
      stack: [py]
    - regex: '!!'
      description: "Pug raw output (!!)"
      stack: [pug]
    - regex: 'eval\('
      description: "eval() — thực thi mã JavaScript tùy ý"
      stack: [js, ts]
    - regex: 'new Function\('
      description: "new Function() — tạo hàm từ chuỗi"
      stack: [js, ts]
    - regex: 'location\.(href|assign|replace)\s*=.*\+'
      description: "Gán location với nối chuỗi — open redirect / XSS"
      stack: [js, ts]
    - regex: 'window\.open\(.*\+'
      description: "window.open với nối chuỗi"
      stack: [js, ts]
    - regex: 'res\.(send|end|write)\(.*req\.(body|params|query|headers)'
      description: "Server phản hồi trực tiếp user input — Reflected XSS"
      stack: [js, ts]
    - regex: 'echo\s+\$_(GET|POST|REQUEST|COOKIE)'
      description: "PHP echo user input không qua htmlspecialchars"
      stack: [php]
    - regex: '\<%=.*req\.(body|params|query)'
      description: "EJS output user input không escape"
      stack: [ejs]
    - regex: 'req\.(body|params|query)\['
      description: "User input đi thẳng vào render/response"
      stack: [js, ts]
    - regex: '\$_(GET|POST|REQUEST)'
      description: "PHP superglobal không qua sanitize_text_field/wp_kses/esc_html"
      stack: [php]
    - regex: 'href\s*=.*req\.(body|params|query)'
      description: "User input trong href — javascript: protocol injection"
      stack: [js, ts, php]
    - regex: 'src\s*=.*req\.(body|params|query)'
      description: "User input trong src"
      stack: [js, ts, php]
    - regex: 'action\s*=.*req\.(body|params|query)'
      description: "User input trong form action"
      stack: [js, ts, php]
    - regex: 'window\.location\s*=.*\+'
      description: "Open Redirect có thể chain với XSS"
      stack: [js, ts]
    - regex: '<a.*href.*\$\{'
      description: "Template literal trong href"
      stack: [js, ts]
    - regex: 'addEventListener\([''"]message[''"]'
      description: "postMessage listener thiếu origin check"
      stack: [js, ts]
    - regex: 'postMessage\(.*,\s*[''"]\*[''"]\)'
      description: "postMessage gửi tới mọi origin"
      stack: [js, ts]
    - regex: 'event\.data'
      description: "event.data đưa vào innerHTML/eval — DOM XSS qua postMessage"
      stack: [js, ts]
    - regex: 'style\s*=.*req\.(body|params|query)'
      description: "User input trong inline style — CSS injection"
      stack: [js, ts, php]
    - regex: 'expression\('
      description: "CSS expression() — thực thi JS qua CSS (IE legacy)"
      stack: [css]
    - regex: 'url\(.*\$\{'
      description: "CSS url() với user input — data exfiltration"
      stack: [js, ts, css]
  fixes:
    - pattern: "DOM XSS (innerHTML, document.write)"
      fix: "Dùng textContent thay vì innerHTML, hoặc DOMPurify.sanitize() trước khi gán"
    - pattern: "React dangerouslySetInnerHTML"
      fix: "Dùng DOMPurify.sanitize() trước khi truyền vào dangerouslySetInnerHTML"
    - pattern: "Server-side reflected XSS"
      fix: "Encode output bằng framework auto-escape hoặc encode functions (esc_html, htmlspecialchars)"
    - pattern: "javascript: protocol"
      fix: "Validate URL scheme — chỉ cho phép http:// và https://"
    - pattern: "postMessage XSS"
      fix: "Kiểm tra event.origin trước khi xử lý message"
    - pattern: "CSS injection"
      fix: "Sanitize CSS values, không cho user input vào inline style"
  fastcode_queries:
    - "Biến nào được truyền vào innerHTML hoặc dangerouslySetInnerHTML?"
    - "Liệt kê tất cả nơi user input được render ra HTML không qua encode"
    - "Tìm tất cả postMessage listener và kiểm tra origin validation"

cmd-injection:
  owasp: "A03:2021 Injection"
  severity: critical
  evidence_file: evidence_sec_cmdi.md
  patterns:
    - regex: 'require\([''"]child_process[''"]\)'
      description: "Import child_process module"
      stack: [js, ts]
    - regex: 'from [''"]child_process[''"]'
      description: "ES import child_process"
      stack: [js, ts]
    - regex: 'exec\('
      description: "exec() — shell mode, nguy hiểm nhất"
      stack: [js, ts, php]
    - regex: 'execSync\('
      description: "execSync() — shell mode đồng bộ"
      stack: [js, ts]
    - regex: 'spawn\(.*shell:\s*true'
      description: "spawn với shell mode bật"
      stack: [js, ts]
    - regex: 'spawn\(.*\$\{'
      description: "Template literal trong spawn args"
      stack: [js, ts]
    - regex: 'exec\(.*\$\{'
      description: "Template literal trong exec command"
      stack: [js, ts]
    - regex: 'exec\(.*\+'
      description: "Nối chuỗi trong exec command"
      stack: [js, ts]
    - regex: 'shell_exec\('
      description: "PHP shell_exec()"
      stack: [php]
    - regex: 'system\('
      description: "PHP/Python system()"
      stack: [php, py]
    - regex: 'passthru\('
      description: "PHP passthru()"
      stack: [php]
    - regex: 'popen\('
      description: "PHP/Python popen()"
      stack: [php, py]
    - regex: 'proc_open\('
      description: "PHP proc_open()"
      stack: [php]
    - regex: 'os\.system\('
      description: "Python os.system()"
      stack: [py]
    - regex: 'os\.popen\('
      description: "Python os.popen()"
      stack: [py]
    - regex: 'subprocess\.(call|run|Popen)\(.*shell\s*=\s*True'
      description: "Python subprocess với shell=True"
      stack: [py]
    - regex: 'subprocess\.(call|run|Popen)\(.*f[''"]'
      description: "Python subprocess với f-string"
      stack: [py]
    - regex: 'commands\.getoutput\('
      description: "Python commands.getoutput() (deprecated)"
      stack: [py]
    - regex: '%x\{|%x\(|%x\['
      description: "Ruby shell execution (%x)"
      stack: [rb]
    - regex: 'Kernel\.system\('
      description: "Ruby Kernel.system()"
      stack: [rb]
    - regex: 'Kernel\.exec\('
      description: "Ruby Kernel.exec()"
      stack: [rb]
    - regex: 'IO\.popen\('
      description: "Ruby IO.popen()"
      stack: [rb]
    - regex: 'Open3\.(capture2|capture3|popen3)\('
      description: "Ruby Open3 shell execution"
      stack: [rb]
    - regex: 'git.*--upload-pack'
      description: "Git argument injection"
      stack: [js, ts, py, rb]
    - regex: 'ffmpeg.*-i.*\$\{'
      description: "ffmpeg argument injection"
      stack: [js, ts, py]
    - regex: 'curl.*\$\{'
      description: "curl argument injection (có thể chứa -o, --output)"
      stack: [js, ts, py, rb]
    - regex: 'tar.*\$\{'
      description: "tar argument injection (--checkpoint-action)"
      stack: [js, ts, py, rb]
    - regex: 'rsync.*\$\{'
      description: "rsync argument injection (-e)"
      stack: [js, ts, py, rb]
    - regex: 'process\.env\[.*req\.'
      description: "User input gán environment variable"
      stack: [js, ts]
    - regex: 'os\.environ\[.*request\.'
      description: "Python user input gán env variable"
      stack: [py]
    - regex: 'putenv\(.*\$_(GET|POST)'
      description: "PHP user input gán env variable"
      stack: [php]
    - regex: '\+\s*req\.(body|params|query)'
      description: "Nối chuỗi user input vào command"
      stack: [js, ts]
    - regex: '\+\s*request\.(form|args|json)'
      description: "Python nối chuỗi user input vào command"
      stack: [py]
    - regex: '\|\s*\$\{'
      description: "Pipe chain với template literal"
      stack: [js, ts]
    - regex: '\|\s*"\s*\+'
      description: "Pipe chain với nối chuỗi"
      stack: [js, ts, py]
  fixes:
    - pattern: "exec() / shell mode"
      fix: "Thay exec() bằng execFile() hoặc spawn() (không shell) — truyền arguments dạng mảng"
    - pattern: "User input trong command"
      fix: "Dùng allowlist cho giá trị hợp lệ, không truyền raw user input vào shell"
    - pattern: "Argument injection"
      fix: "Validate arguments, dùng -- để kết thúc options, escape shell metacharacters"
    - pattern: "Environment variable injection"
      fix: "Không cho user input gán env variable, dùng whitelist"
    - pattern: "PHP shell functions"
      fix: "Dùng escapeshellarg() và escapeshellcmd() cho arguments, hoặc tránh shell functions"
  fastcode_queries:
    - "Liệt kê tất cả nơi gọi child_process hoặc exec/spawn trong dự án"
    - "Biến truyền vào exec() có nguồn gốc từ user input không?"
    - "Tìm tất cả nơi chạy shell command với user-controlled arguments"

path-traversal:
  owasp: "A10:2021 SSRF"
  severity: high
  evidence_file: evidence_sec_pathtr.md
  patterns:
    - regex: 'fs\.(readFile|writeFile|readFileSync|writeFileSync|createReadStream|createWriteStream|unlink|rmdir|mkdir|access|stat)\(.*req\.(body|params|query)'
      description: "Node.js file operation với user input"
      stack: [js, ts]
    - regex: 'path\.join\(.*req\.(body|params|query)'
      description: "path.join với user input — thiếu prefix validation"
      stack: [js, ts]
    - regex: 'path\.resolve\(.*req\.(body|params|query)'
      description: "path.resolve với user input — cần kiểm tra startsWith()"
      stack: [js, ts]
    - regex: 'res\.(sendFile|download)\(.*req\.(body|params|query)'
      description: "Express sendFile/download với user input"
      stack: [js, ts]
    - regex: '(include|require|include_once|require_once)\s*\(?\s*\$_(GET|POST|REQUEST)'
      description: "PHP include/require với user input — LFI/RFI"
      stack: [php]
    - regex: 'file_get_contents\(.*\$_(GET|POST|REQUEST)'
      description: "PHP file_get_contents với user input"
      stack: [php]
    - regex: 'fopen\(.*\$_(GET|POST|REQUEST)'
      description: "PHP fopen với user input"
      stack: [php]
    - regex: 'readfile\(.*\$_(GET|POST|REQUEST)'
      description: "PHP readfile với user input"
      stack: [php]
    - regex: 'move_uploaded_file\(.*\$_(GET|POST|REQUEST)'
      description: "PHP move_uploaded_file destination từ user"
      stack: [php]
    - regex: 'open\(.*request\.(form|args|json|files)'
      description: "Python open() với user input"
      stack: [py]
    - regex: 'send_file\(.*request\.(form|args|json)'
      description: "Flask send_file với user input"
      stack: [py]
    - regex: 'os\.path\.join\(.*request\.(form|args|json)'
      description: "Python os.path.join với user input"
      stack: [py]
    - regex: '\.\./'
      description: "Pattern duyệt thư mục cha (../)"
      stack: [js, ts, php, py, rb]
    - regex: '\.\.\\'
      description: "Pattern duyệt thư mục cha Windows (..\\)"
      stack: [js, ts, php, py]
    - regex: 'decodeURIComponent'
      description: "decodeURIComponent trước kiểm tra — double encoding bypass"
      stack: [js, ts]
    - regex: 'fetch\(.*req\.(body|params|query)'
      description: "SSRF — fetch URL từ user input"
      stack: [js, ts]
    - regex: 'axios\.(get|post)\(.*req\.(body|params|query)'
      description: "SSRF — axios request URL từ user input"
      stack: [js, ts]
    - regex: 'http\.get\(.*req\.(body|params|query)'
      description: "SSRF — http.get URL từ user input"
      stack: [js, ts]
    - regex: '169\.254\.169\.254'
      description: "Cloud metadata SSRF target (AWS)"
      stack: [js, ts, py, php, rb, go]
    - regex: 'metadata\.google'
      description: "Cloud metadata SSRF target (GCP)"
      stack: [js, ts, py, php, rb, go]
    - regex: 'tar\.extract\('
      description: "Zip Slip — extract archive từ user upload"
      stack: [js, ts, py]
    - regex: 'zipfile\.extractall\('
      description: "Python Zip Slip — extractall không validate member paths"
      stack: [py]
    - regex: 'AdmZip\('
      description: "Node.js AdmZip — kiểm tra entry names cho ../"
      stack: [js, ts]
    - regex: 'fs\.readlink|os\.readlink'
      description: "Symlink escape — follow symlink ra ngoài allowed directory"
      stack: [js, ts, py]
  fixes:
    - pattern: "Path traversal"
      fix: "Dùng path.resolve(base, input) rồi kiểm tra resolvedPath.startsWith(base) — KHÔNG dùng path.join"
    - pattern: "SSRF"
      fix: "Validate URL scheme (chỉ http/https), block internal IPs (10.x, 172.16-31.x, 192.168.x, 127.x, 169.254.x)"
    - pattern: "Zip Slip"
      fix: "Validate entry.name không chứa ../ trước khi extract, dùng path.resolve + startsWith check"
    - pattern: "PHP LFI/RFI"
      fix: "Dùng whitelist file names, không cho user input vào include/require"
    - pattern: "Double encoding"
      fix: "Decode trước rồi mới validate, kiểm tra cả %2e%2e%2f"
  fastcode_queries:
    - "Tìm tất cả nơi user input được dùng để xây dựng file path"
    - "Liệt kê tất cả endpoint có sendFile, download, hoặc đọc file theo tham số"
    - "Tìm tất cả nơi fetch/axios/http.get nhận URL từ user input"

secrets:
  owasp: "A02:2021 Cryptographic Failures"
  severity: critical
  evidence_file: evidence_sec_secrets.md
  patterns:
    - regex: '(password|passwd|pwd|secret|token|api_?key|apikey|auth)\s*[:=]\s*[''"][^''"]{8,}[''"]'
      description: "Hardcoded password/secret/token/API key"
      stack: [js, ts, py, php, rb, go, java]
    - regex: 'AKIA[0-9A-Z]{16}'
      description: "AWS Access Key ID"
      stack: [js, ts, py, php, rb, go, java]
    - regex: 'sk_(live|test)_[0-9a-zA-Z]{24,}'
      description: "Stripe Secret Key"
      stack: [js, ts, py, php, rb]
    - regex: 'gh[pousr]_[A-Za-z0-9_]{36,}'
      description: "GitHub Personal Access Token"
      stack: [js, ts, py, php, rb, go]
    - regex: 'xox[baprs]-[0-9a-zA-Z-]{10,}'
      description: "Slack Token"
      stack: [js, ts, py, php, rb]
    - regex: 'AIza[0-9A-Za-z_-]{35}'
      description: "Google API Key"
      stack: [js, ts, py, php, rb, go]
    - regex: 'SG\.[0-9A-Za-z_-]{22}\.[0-9A-Za-z_-]{43}'
      description: "SendGrid API Key"
      stack: [js, ts, py, php, rb]
    - regex: 'SK[0-9a-fA-F]{32}'
      description: "Twilio API Key"
      stack: [js, ts, py, php, rb]
    - regex: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
      description: "Hardcoded JWT token"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
      description: "Private key trong source code"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      description: "PGP private key trong source code"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '(mongodb|mysql|postgres|postgresql|redis|amqp|mssql)://[^/\s''"]{10,}'
      description: "Connection string chứa credentials"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '(DATABASE_URL|REDIS_URL|MONGO_URI)\s*=\s*[''"](?!process\.env)'
      description: "Hardcode database/redis/mongo URL"
      stack: [js, ts, py, php]
    - regex: 'console\.(log|info|warn|error|debug)\(.*password'
      description: "Log chứa password"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*token'
      description: "Log chứa token"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*secret'
      description: "Log chứa secret"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*req\.body\)'
      description: "Log toàn bộ request body — có thể chứa thông tin nhạy cảm"
      stack: [js, ts]
    - regex: 'res\.(json|send)\(.*err\.(stack|message)'
      description: "Stack trace trả về client"
      stack: [js, ts]
    - regex: 'res\.(json|send)\(.*error\.stack'
      description: "Error stack trả về client"
      stack: [js, ts]
    - regex: 'showStack:\s*true'
      description: "Express error handler expose stack"
      stack: [js, ts]
    - regex: 'print\(.*password'
      description: "Python print password"
      stack: [py]
  fixes:
    - pattern: "Hardcoded credentials"
      fix: "Chuyển sang environment variables (process.env, os.environ), dùng .env file (không commit)"
    - pattern: "API keys"
