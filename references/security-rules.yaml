      description: "Python ReDoS — regex injection from user input"
      stack: [py]
    - regex: 'USER root'
      description: "Dockerfile container running as root"
      stack: [dockerfile]
    - regex: '--privileged'
      description: "Docker privileged mode"
      stack: [yaml, yml]
    - regex: 'EXPOSE 22'
      description: "SSH in container"
      stack: [dockerfile]
    - regex: 'rejectUnauthorized:\s*false'
