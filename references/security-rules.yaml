logging:
  owasp: "A09:2021 Security Logging Failures"
  severity: medium
  evidence_file: evidence_sec_logging.md
  patterns:
    - regex: 'login|signin|authenticate'
      description: "Login handler — PHẢI có audit log"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'logout|signout'
      description: "Logout handler — PHẢI log session termination"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'register|signup|createUser'
      description: "Register handler — PHẢI log new account creation"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'changePassword|resetPassword|forgotPassword'
      description: "Password change handler — PHẢI log password events"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'deleteUser|deleteAccount|deactivate'
      description: "Delete account handler — PHẢI log account deletion"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'role|permission|grant|revoke|admin'
      description: "Privilege change handler — PHẢI log privilege changes"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'payment|charge|refund|transfer|withdraw'
      description: "Financial transaction handler — PHẢI log transactions"
      stack: [js, ts, py, php, java, go, rb]
    - regex: 'console\.log\(.*\+.*req\.(body|params|query|headers)'
      description: "Log injection — user input nối vào log"
      stack: [js, ts]
    - regex: 'logger\.\w+\(.*\$\{.*req\.'
      description: "Log injection — template literal với user input trong log"
      stack: [js, ts]
    - regex: 'console\.log\(.*password'
      description: "PII trong log — password"
      stack: [js, ts]
    - regex: 'console\.log\(.*token'
      description: "PII trong log — token"
      stack: [js, ts]
    - regex: 'console\.log\(.*secret'
      description: "PII trong log — secret"
      stack: [js, ts]
    - regex: 'console\.log\(.*credit.?card'
      description: "PII trong log — credit card"
      stack: [js, ts]
    - regex: 'console\.log\(.*req\.body\)'
      description: "Dump toàn bộ request body vào log — PII leak"
      stack: [js, ts]
    - regex: 'logger\.\w+\(.*req\.headers\)'
      description: "Dump headers vào log — chứa Authorization"
      stack: [js, ts]
    - regex: 'console\.log\(.*err\.stack\)'
      description: "Stack trace trong log — expose internal paths"
      stack: [js, ts]
    - regex: 'printStackTrace\(\)'
      description: "Java stack trace exposure"
      stack: [java]
  fixes:
    - pattern: "Thiếu audit log"
      fix: "Thêm structured log cho security events: who (user), what (action), when (timestamp), where (IP), outcome (success/fail)"
    - pattern: "Log injection"
      fix: "Dùng structured logging (JSON format) thay vì string concatenation, encode/escape user input trước khi log"
    - pattern: "PII trong log"
      fix: "Redact/mask sensitive fields trước khi log, dùng field-level filtering"
    - pattern: "Thiếu monitoring"
      fix: "Kết nối với SIEM/alert system, set alert cho 5+ login failures từ cùng IP"
    - pattern: "Log tampering"
      fix: "Dùng centralized logging (ELK, CloudWatch), log rotation, không ghi log trong webroot"
  fastcode_queries:
    - "Tìm tất cả auth/login handlers và kiểm tra có log statement không"
    - "Liệt kê tất cả nơi log chứa thông tin nhạy cảm"
    - "Dự án dùng logging framework nào?"
