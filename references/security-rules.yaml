    - pattern: "Cookie misconfiguration"
      fix: "Set cookie: secure=true, httpOnly=true, sameSite='strict'"
    - pattern: "ReDoS"
      fix: "Do not create RegExp from user input. If needed, use RE2 (linear-time regex engine)"
    - pattern: "TLS disabled"
      fix: "Never disable TLS verification in production"
