prototype-pollution:
  owasp: "A03:2021 Injection"
  severity: high
  evidence_file: evidence_sec_pollution.md
  patterns:
    - regex: 'Object\.assign\(.*req\.(body|params|query)'
      description: "Object.assign with user input — dangerous shallow merge"
      stack: [js, ts]
    - regex: '\{\.\.\.req\.(body|query|params)\}'
      description: "Spread operator from user input"
      stack: [js, ts]
    - regex: '\.merge\(.*req\.(body|query|params)'
      description: "lodash/underscore merge with user input"
      stack: [js, ts]
    - regex: '\.defaultsDeep\(.*req\.(body|query|params)'
      description: "lodash defaultsDeep with user input (CVE-2019-10744)"
      stack: [js, ts]
    - regex: '\.extend\(.*req\.(body|query|params)'
      description: "jQuery/underscore extend with user input"
      stack: [js, ts]
    - regex: 'deepMerge\(.*req\.|deepClone\(.*req\.|deepAssign\(.*req\.'
      description: "Custom deep merge/clone with user input"
      stack: [js, ts]
    - regex: 'function.*merge.*\('
      description: "Custom merge function — check key filtering"
      stack: [js, ts]
    - regex: 'function.*deep(Copy|Clone|Merge|Assign)'
      description: "Custom deep function — check __proto__/constructor filtering"
      stack: [js, ts]
    - regex: '\[req\.(body|params|query)\['
      description: "Dynamic property access with user-controlled key"
      stack: [js, ts]
    - regex: '__proto__'
      description: "__proto__ — prototype pollution payload"
      stack: [js, ts]
    - regex: '__proto__\.outputFunctionName'
      description: "EJS RCE gadget via prototype pollution"
      stack: [js, ts]
    - regex: '__proto__\.client|__proto__\.escapeFunction'
      description: "Pug RCE gadget via prototype pollution"
      stack: [js, ts]
    - regex: '__proto__\.allowProtoMethodsByDefault'
      description: "Handlebars method invocation gadget"
      stack: [js, ts]
  fixes:
    - pattern: "Deep merge from user input"
      fix: "Use Object.create(null) as target, or filter keys: key !== '__proto__' && key !== 'constructor' && key !== 'prototype'"
    - pattern: "Dynamic property access"
      fix: "Use Map instead of plain object for user-controlled keys"
    - pattern: "Library CVE"
      fix: "Upgrade lodash ≥ 4.17.21, minimist ≥ 1.2.6, qs ≥ 6.10.3"
    - pattern: "Gadget chain"
      fix: "Upgrade template engine, use Object.freeze(Object.prototype) if needed"
  fastcode_queries:
    - "Find all places merging/assigning objects with user input"
    - "List all custom deep merge/clone functions in the project"
    - "Check if the project uses any template engine with known gadget chains"

