      stack: [php]
    - regex: 'error_reporting.*E_ALL'
      description: "PHP error_reporting E_ALL"
      stack: [php]
    - regex: 'cookie.*secure:\s*false'
      description: "Cookie transmitted over HTTP (not HTTPS)"
