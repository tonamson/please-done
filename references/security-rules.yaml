# security-rules.yaml — Single source of truth for 13 OWASP scanner categories
# Migrated from 13 separate pd-sec-*.md files into 1 centralized YAML file.
# Each category contains: owasp, severity, evidence_file, patterns[], fixes[], fastcode_queries[]

sql-injection:
  owasp: "A03:2021 Injection"
  severity: critical
  evidence_file: evidence_sec_sqli.md
  patterns:
    - regex: 'query\(.*\+'
      description: "Raw SQL string concatenation using + operator"
      stack: [js, ts, php, py]
    - regex: 'query\(.*\$\{'
      description: "Template literal in SQL query"
      stack: [js, ts]
    - regex: '"SELECT.*" \+'
      description: "SELECT statement concatenated with + operator"
      stack: [js, ts, php, py]
    - regex: "'SELECT.*' \\+"
      description: "SELECT (single quotes) string concatenation"
      stack: [js, ts, php, py]
    - regex: '`SELECT.*\$\{'
      description: "Template literal containing SELECT"
      stack: [js, ts]
    - regex: '`INSERT.*\$\{'
      description: "Template literal containing INSERT"
      stack: [js, ts]
    - regex: '`UPDATE.*\$\{'
      description: "Template literal containing UPDATE"
      stack: [js, ts]
    - regex: '`DELETE.*\$\{'
      description: "Template literal containing DELETE"
      stack: [js, ts]
    - regex: 'sequelize\.query\('
      description: "Sequelize raw query mode"
      stack: [js, ts]
    - regex: '\$queryRaw'
      description: "Prisma raw query"
      stack: [js, ts]
    - regex: '\$executeRaw'
      description: "Prisma raw execute"
      stack: [js, ts]
    - regex: 'raw\('
      description: "ORM raw query function"
      stack: [js, ts, py]
    - regex: 'textual\('
      description: "SQLAlchemy textual query"
      stack: [py]
    - regex: 'connection\.query\(.*req\.(body|params|query)'
      description: "User input passed directly into connection.query()"
      stack: [js, ts]
    - regex: '\$wpdb->(query|get_row|get_results|get_var)\('
      description: "WordPress wpdb query without prepare"
      stack: [php]
    - regex: '\$where'
      description: "MongoDB $where — JavaScript execution in query"
      stack: [js, ts]
    - regex: '\.(find|findOne|updateOne|deleteOne)\(.*req\.(body|params|query)'
      description: "User input directly into MongoDB query"
      stack: [js, ts]
    - regex: '\$gt|\$gte|\$lt|\$lte|\$ne|\$in|\$regex'
      description: "MongoDB operator injection via JSON body"
      stack: [js, ts]
    - regex: 'collection\.aggregate\(.*req\.body'
      description: "MongoDB pipeline injection"
      stack: [js, ts]
    - regex: 'knex\.raw\(.*\$\{'
      description: "Template literal in Knex raw query"
      stack: [js, ts]
    - regex: '\.whereRaw\(.*\+'
      description: "Knex whereRaw with string concatenation"
      stack: [js, ts]
    - regex: '\.orderByRaw\(.*req\.'
      description: "Knex orderByRaw injection"
      stack: [js, ts]
    - regex: 'cursor\.execute\(f[''"]'
      description: "Python f-string in cursor.execute"
      stack: [py]
    - regex: 'cursor\.execute\(.*\.format\('
      description: "Python str.format in SQL"
      stack: [py]
    - regex: 'cursor\.execute\(.*%.*%'
      description: "Python old-style format in SQL"
      stack: [py]
  fixes:
    - pattern: "Raw SQL string concatenation"
      fix: "Use parameterized query or prepared statement instead of string concatenation"
    - pattern: "ORM raw mode"
      fix: "Use ORM query builder (TypeORM .where(), Prisma .findMany(), Sequelize .findAll())"
    - pattern: "WordPress wpdb"
      fix: "Use $wpdb->prepare() with placeholder %s, %d"
    - pattern: "MongoDB injection"
      fix: "Validate input type before passing to query, use mongoose schema validation"
    - pattern: "Knex raw"
      fix: "Use Knex query builder instead of .raw(), or use bindings: knex.raw('? = ?', [val1, val2])"
    - pattern: "Python f-string SQL"
      fix: "Use parameterized query: cursor.execute('SELECT * FROM t WHERE id = %s', (id,))"
    - pattern: "Second-order SQLi"
      fix: "Parameterize queries using data from DB as well — DB data is not trustworthy if users can insert"
  fastcode_queries:
    - "Which variables in the project are passed directly into SQL queries without parameterization?"
    - "List all places that import/use raw queries in the project"
    - "Find all endpoints that receive user input and pass to database queries"

xss:
  owasp: "A03:2021 Injection"
  severity: high
  evidence_file: evidence_sec_xss.md
  patterns:
    - regex: 'innerHTML\s*='
      description: "Direct innerHTML assignment — DOM XSS vector"
      stack: [js, ts, jsx, tsx]
    - regex: 'outerHTML\s*='
      description: "Direct outerHTML assignment"
      stack: [js, ts]
    - regex: 'document\.write\('
      description: "document.write — writes HTML without encoding"
      stack: [js, ts]
    - regex: 'document\.writeln\('
      description: "document.writeln — writes HTML without encoding"
      stack: [js, ts]
    - regex: '\.insertAdjacentHTML\('
      description: "insertAdjacentHTML — inserts raw HTML"
      stack: [js, ts]
    - regex: 'dangerouslySetInnerHTML'
      description: "React dangerouslySetInnerHTML — bypasses auto-escape"
      stack: [jsx, tsx]
    - regex: 'v-html'
      description: "Vue v-html — renders raw HTML"
      stack: [vue]
    - regex: '\[innerHTML\]'
      description: "Angular innerHTML binding"
      stack: [ts]
    - regex: '\{@html'
      description: "Svelte @html — renders raw HTML"
      stack: [svelte]
    - regex: '\|safe'
      description: "Jinja2 |safe filter — bypasses auto-escape"
      stack: [py]
    - regex: '!!'
      description: "Pug raw output (!!)"
      stack: [pug]
    - regex: 'eval\('
      description: "eval() — executes arbitrary JavaScript code"
      stack: [js, ts]
    - regex: 'new Function\('
      description: "new Function() — creates function from string"
      stack: [js, ts]
    - regex: 'location\.(href|assign|replace)\s*=.*\+'
      description: "Location assignment with concatenation — open redirect / XSS"
      stack: [js, ts]
    - regex: 'window\.open\(.*\+'
      description: "window.open with concatenation"
      stack: [js, ts]
    - regex: 'res\.(send|end|write)\(.*req\.(body|params|query|headers)'
      description: "Server responds directly with user input — Reflected XSS"
      stack: [js, ts]
    - regex: 'echo\s+\$_(GET|POST|REQUEST|COOKIE)'
      description: "PHP echo user input without htmlspecialchars"
      stack: [php]
    - regex: '\<%=.*req\.(body|params|query)'
      description: "EJS output user input without escaping"
      stack: [ejs]
    - regex: 'req\.(body|params|query)\['
      description: "User input goes directly into render/response"
      stack: [js, ts]
    - regex: '\$_(GET|POST|REQUEST)'
      description: "PHP superglobal without sanitize_text_field/wp_kses/esc_html"
      stack: [php]
    - regex: 'href\s*=.*req\.(body|params|query)'
      description: "User input in href — javascript: protocol injection"
      stack: [js, ts, php]
    - regex: 'src\s*=.*req\.(body|params|query)'
      description: "User input in src"
      stack: [js, ts, php]
    - regex: 'action\s*=.*req\.(body|params|query)'
      description: "User input in form action"
      stack: [js, ts, php]
    - regex: 'window\.location\s*=.*\+'
      description: "Open Redirect can chain with XSS"
      stack: [js, ts]
    - regex: '<a.*href.*\$\{'
      description: "Template literal in href"
      stack: [js, ts]
    - regex: 'addEventListener\([''"]message[''"]'
      description: "postMessage listener missing origin check"
      stack: [js, ts]
    - regex: 'postMessage\(.*,\s*[''"]\*[''"]\)'
      description: "postMessage sent to all origins"
      stack: [js, ts]
    - regex: 'event\.data'
      description: "event.data into innerHTML/eval — DOM XSS via postMessage"
      stack: [js, ts]
    - regex: 'style\s*=.*req\.(body|params|query)'
      description: "User input in inline style — CSS injection"
      stack: [js, ts, php]
    - regex: 'expression\('
      description: "CSS expression() — executes JS via CSS (IE legacy)"
      stack: [css]
    - regex: 'url\(.*\$\{'
      description: "CSS url() with user input — data exfiltration"
      stack: [js, ts, css]
  fixes:
    - pattern: "DOM XSS (innerHTML, document.write)"
      fix: "Use textContent instead of innerHTML, or DOMPurify.sanitize() before assignment"
    - pattern: "React dangerouslySetInnerHTML"
      fix: "Use DOMPurify.sanitize() before passing to dangerouslySetInnerHTML"
    - pattern: "Server-side reflected XSS"
      fix: "Encode output using framework auto-escape or encode functions (esc_html, htmlspecialchars)"
    - pattern: "javascript: protocol"
      fix: "Validate URL scheme — only allow http:// and https://"
    - pattern: "postMessage XSS"
      fix: "Check event.origin before processing message"
    - pattern: "CSS injection"
      fix: "Sanitize CSS values, do not allow user input in inline style"
  fastcode_queries:
    - "Which variables are passed into innerHTML or dangerouslySetInnerHTML?"
    - "List all places where user input is rendered to HTML without encoding"
    - "Find all postMessage listeners and check for origin validation"

cmd-injection:
  owasp: "A03:2021 Injection"
  severity: critical
  evidence_file: evidence_sec_cmdi.md
  patterns:
    - regex: 'require\([''"]child_process[''"]\)'
      description: "Import child_process module"
      stack: [js, ts]
    - regex: 'from [''"]child_process[''"]'
      description: "ES import child_process"
      stack: [js, ts]
    - regex: 'exec\('
      description: "exec() — shell mode, most dangerous"
      stack: [js, ts, php]
    - regex: 'execSync\('
      description: "execSync() — synchronous shell mode"
      stack: [js, ts]
    - regex: 'spawn\(.*shell:\s*true'
      description: "spawn with shell mode enabled"
      stack: [js, ts]
    - regex: 'spawn\(.*\$\{'
      description: "Template literal in spawn args"
      stack: [js, ts]
    - regex: 'exec\(.*\$\{'
      description: "Template literal in exec command"
      stack: [js, ts]
    - regex: 'exec\(.*\+'
      description: "String concatenation in exec command"
      stack: [js, ts]
    - regex: 'shell_exec\('
      description: "PHP shell_exec()"
      stack: [php]
    - regex: 'system\('
      description: "PHP/Python system()"
      stack: [php, py]
    - regex: 'passthru\('
      description: "PHP passthru()"
      stack: [php]
    - regex: 'popen\('
      description: "PHP/Python popen()"
      stack: [php, py]
    - regex: 'proc_open\('
      description: "PHP proc_open()"
      stack: [php]
    - regex: 'os\.system\('
      description: "Python os.system()"
      stack: [py]
    - regex: 'os\.popen\('
      description: "Python os.popen()"
      stack: [py]
    - regex: 'subprocess\.(call|run|Popen)\(.*shell\s*=\s*True'
      description: "Python subprocess with shell=True"
      stack: [py]
    - regex: 'subprocess\.(call|run|Popen)\(.*f[''"]'
      description: "Python subprocess with f-string"
      stack: [py]
    - regex: 'commands\.getoutput\('
      description: "Python commands.getoutput() (deprecated)"
      stack: [py]
    - regex: '%x\{|%x\(|%x\['
      description: "Ruby shell execution (%x)"
      stack: [rb]
    - regex: 'Kernel\.system\('
      description: "Ruby Kernel.system()"
      stack: [rb]
    - regex: 'Kernel\.exec\('
      description: "Ruby Kernel.exec()"
      stack: [rb]
    - regex: 'IO\.popen\('
      description: "Ruby IO.popen()"
      stack: [rb]
    - regex: 'Open3\.(capture2|capture3|popen3)\('
      description: "Ruby Open3 shell execution"
      stack: [rb]
    - regex: 'git.*--upload-pack'
      description: "Git argument injection"
      stack: [js, ts, py, rb]
    - regex: 'ffmpeg.*-i.*\$\{'
      description: "ffmpeg argument injection"
      stack: [js, ts, py]
    - regex: 'curl.*\$\{'
      description: "curl argument injection (may contain -o, --output)"
      stack: [js, ts, py, rb]
    - regex: 'tar.*\$\{'
      description: "tar argument injection (--checkpoint-action)"
      stack: [js, ts, py, rb]
    - regex: 'rsync.*\$\{'
      description: "rsync argument injection (-e)"
      stack: [js, ts, py, rb]
    - regex: 'process\.env\[.*req\.'
      description: "User input assigned to environment variable"
      stack: [js, ts]
    - regex: 'os\.environ\[.*request\.'
      description: "Python user input assigned to env variable"
      stack: [py]
    - regex: 'putenv\(.*\$_(GET|POST)'
      description: "PHP user input assigned to env variable"
      stack: [php]
    - regex: '\+\s*req\.(body|params|query)'
      description: "String concatenation of user input into command"
      stack: [js, ts]
    - regex: '\+\s*request\.(form|args|json)'
      description: "Python string concatenation of user input into command"
      stack: [py]
    - regex: '\|\s*\$\{'
      description: "Pipe chain with template literal"
      stack: [js, ts]
    - regex: '\|\s*"\s*\+'
      description: "Pipe chain with string concatenation"
      stack: [js, ts, py]
  fixes:
    - pattern: "exec() / shell mode"
      fix: "Replace exec() with execFile() or spawn() (no shell) — pass arguments as array"
    - pattern: "User input in command"
      fix: "Use allowlist for valid values, do not pass raw user input to shell"
    - pattern: "Argument injection"
      fix: "Validate arguments, use -- to terminate options, escape shell metacharacters"
    - pattern: "Environment variable injection"
      fix: "Do not allow user input to set env variables, use whitelist"
    - pattern: "PHP shell functions"
      fix: "Use escapeshellarg() and escapeshellcmd() for arguments, or avoid shell functions"
  fastcode_queries:
    - "List all places calling child_process or exec/spawn in the project"
    - "Are variables passed to exec() derived from user input?"
    - "Find all places running shell commands with user-controlled arguments"

path-traversal:
  owasp: "A10:2021 SSRF"
  severity: high
  evidence_file: evidence_sec_pathtr.md
  patterns:
    - regex: 'fs\.(readFile|writeFile|readFileSync|writeFileSync|createReadStream|createWriteStream|unlink|rmdir|mkdir|access|stat)\(.*req\.(body|params|query)'
      description: "Node.js file operation with user input"
      stack: [js, ts]
    - regex: 'path\.join\(.*req\.(body|params|query)'
      description: "path.join with user input — missing prefix validation"
      stack: [js, ts]
    - regex: 'path\.resolve\(.*req\.(body|params|query)'
      description: "path.resolve with user input — needs startsWith() check"
      stack: [js, ts]
    - regex: 'res\.(sendFile|download)\(.*req\.(body|params|query)'
      description: "Express sendFile/download with user input"
      stack: [js, ts]
    - regex: '(include|require|include_once|require_once)\s*\(?\s*\$_(GET|POST|REQUEST)'
      description: "PHP include/require with user input — LFI/RFI"
      stack: [php]
    - regex: 'file_get_contents\(.*\$_(GET|POST|REQUEST)'
      description: "PHP file_get_contents with user input"
      stack: [php]
    - regex: 'fopen\(.*\$_(GET|POST|REQUEST)'
      description: "PHP fopen with user input"
      stack: [php]
    - regex: 'readfile\(.*\$_(GET|POST|REQUEST)'
      description: "PHP readfile with user input"
      stack: [php]
    - regex: 'move_uploaded_file\(.*\$_(GET|POST|REQUEST)'
      description: "PHP move_uploaded_file destination from user"
      stack: [php]
    - regex: 'open\(.*request\.(form|args|json|files)'
      description: "Python open() with user input"
      stack: [py]
    - regex: 'send_file\(.*request\.(form|args|json)'
      description: "Flask send_file with user input"
      stack: [py]
    - regex: 'os\.path\.join\(.*request\.(form|args|json)'
      description: "Python os.path.join with user input"
      stack: [py]
    - regex: '\.\./'
      description: "Parent directory traversal pattern (../)"
      stack: [js, ts, php, py, rb]
    - regex: '\.\.\\'
      description: "Parent directory traversal pattern Windows (..\\)"
      stack: [js, ts, php, py]
    - regex: 'decodeURIComponent'
      description: "decodeURIComponent before validation — double encoding bypass"
      stack: [js, ts]
    - regex: 'fetch\(.*req\.(body|params|query)'
      description: "SSRF — fetch URL from user input"
      stack: [js, ts]
    - regex: 'axios\.(get|post)\(.*req\.(body|params|query)'
      description: "SSRF — axios request URL from user input"
      stack: [js, ts]
    - regex: 'http\.get\(.*req\.(body|params|query)'
      description: "SSRF — http.get URL from user input"
      stack: [js, ts]
    - regex: '169\.254\.169\.254'
      description: "Cloud metadata SSRF target (AWS)"
      stack: [js, ts, py, php, rb, go]
    - regex: 'metadata\.google'
      description: "Cloud metadata SSRF target (GCP)"
      stack: [js, ts, py, php, rb, go]
    - regex: 'tar\.extract\('
      description: "Zip Slip — extract archive from user upload"
      stack: [js, ts, py]
    - regex: 'zipfile\.extractall\('
      description: "Python Zip Slip — extractall without validating member paths"
      stack: [py]
    - regex: 'AdmZip\('
      description: "Node.js AdmZip — check entry names for ../"
      stack: [js, ts]
    - regex: 'fs\.readlink|os\.readlink'
      description: "Symlink escape — follow symlink outside allowed directory"
      stack: [js, ts, py]
  fixes:
    - pattern: "Path traversal"
      fix: "Use path.resolve(base, input) then check resolvedPath.startsWith(base) — DO NOT use path.join"
    - pattern: "SSRF"
      fix: "Validate URL scheme (http/https only), block internal IPs (10.x, 172.16-31.x, 192.168.x, 127.x, 169.254.x)"
    - pattern: "Zip Slip"
      fix: "Validate entry.name does not contain ../ before extraction, use path.resolve + startsWith check"
    - pattern: "PHP LFI/RFI"
      fix: "Use whitelist for file names, do not allow user input in include/require"
    - pattern: "Double encoding"
      fix: "Decode first then validate, also check %2e%2e%2f"
  fastcode_queries:
    - "Find all places where user input is used to construct file paths"
    - "List all endpoints that use sendFile, download, or read files by parameter"
    - "Find all places where fetch/axios/http.get receives URL from user input"

secrets:
  owasp: "A02:2021 Cryptographic Failures"
  severity: critical
  evidence_file: evidence_sec_secrets.md
  patterns:
    - regex: '(password|passwd|pwd|secret|token|api_?key|apikey|auth)\s*[:=]\s*[''"][^''"]{8,}[''"]'
      description: "Hardcoded password/secret/token/API key"
      stack: [js, ts, py, php, rb, go, java]
    - regex: 'AKIA[0-9A-Z]{16}'
      description: "AWS Access Key ID"
      stack: [js, ts, py, php, rb, go, java]
    - regex: 'sk_(live|test)_[0-9a-zA-Z]{24,}'
      description: "Stripe Secret Key"
      stack: [js, ts, py, php, rb]
    - regex: 'gh[pousr]_[A-Za-z0-9_]{36,}'
      description: "GitHub Personal Access Token"
      stack: [js, ts, py, php, rb, go]
    - regex: 'xox[baprs]-[0-9a-zA-Z-]{10,}'
      description: "Slack Token"
      stack: [js, ts, py, php, rb]
    - regex: 'AIza[0-9A-Za-z_-]{35}'
      description: "Google API Key"
      stack: [js, ts, py, php, rb, go]
    - regex: 'SG\.[0-9A-Za-z_-]{22}\.[0-9A-Za-z_-]{43}'
      description: "SendGrid API Key"
      stack: [js, ts, py, php, rb]
    - regex: 'SK[0-9a-fA-F]{32}'
      description: "Twilio API Key"
      stack: [js, ts, py, php, rb]
    - regex: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
      description: "Hardcoded JWT token"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
      description: "Private key in source code"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      description: "PGP private key in source code"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '(mongodb|mysql|postgres|postgresql|redis|amqp|mssql)://[^/\s''"]{10,}'
      description: "Connection string containing credentials"
      stack: [js, ts, py, php, rb, go, java]
    - regex: '(DATABASE_URL|REDIS_URL|MONGO_URI)\s*=\s*[''"](?!process\.env)'
      description: "Hardcode database/redis/mongo URL"
      stack: [js, ts, py, php]
    - regex: 'console\.(log|info|warn|error|debug)\(.*password'
      description: "Log containing password"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*token'
      description: "Log containing token"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*secret'
      description: "Log containing secret"
      stack: [js, ts]
    - regex: 'console\.(log|info|warn|error|debug)\(.*req\.body\)'
      description: "Log entire request body — may contain sensitive information"
      stack: [js, ts]
    - regex: 'res\.(json|send)\(.*err\.(stack|message)'
      description: "Stack trace returned to client"
      stack: [js, ts]
    - regex: 'res\.(json|send)\(.*error\.stack'
      description: "Error stack returned to client"
      stack: [js, ts]
    - regex: 'showStack:\s*true'
      description: "Express error handler expose stack"
      stack: [js, ts]
    - regex: 'print\(.*password'
      description: "Python print password"
      stack: [py]
  fixes:
    - pattern: "Hardcoded credentials"
      fix: "Move to environment variables (process.env, os.environ), use .env file (do not commit)"
    - pattern: "API keys"
      fix: "Rotate key immediately, move to env vars, add .env to .gitignore"
    - pattern: "Private keys"
      fix: "Remove from repo, rotate key, use secrets manager (AWS Secrets Manager, HashiCorp Vault)"
    - pattern: "Connection strings"
      fix: "Use env vars for connection strings, do not commit .env"
    - pattern: "Logging sensitive data"
      fix: "Redact sensitive fields before logging, use structured logging with field filtering"
    - pattern: "Stack trace exposure"
      fix: "Custom error handler returns generic message to client, logs details server-side"
  fastcode_queries:
    - "Find all places with hardcoded passwords, API keys, or secrets in the project"
    - "List all places where logs contain sensitive information (password, token, secret)"
    - "Check if .env files are committed to the repo"

auth:
  owasp: "A01:2021 Broken Access Control"
  severity: high
  evidence_file: evidence_sec_auth.md
  patterns:
    - regex: 'req\.params\.(id|userId|orderId|fileId)'
      description: "IDOR — route handler uses ID from params, needs ownership check"
      stack: [js, ts]
    - regex: 'findOne\(.*req\.params|findById\(.*req\.params'
      description: "IDOR — DB query without ownership check"
      stack: [js, ts]
    - regex: '@Param\([''"]id[''"]\)'
      description: "NestJS IDOR — controller receives ID without guard"
      stack: [ts]
    - regex: '\$_GET\[.id.\]|\$_POST\[.id.\]'
      description: "PHP IDOR — query with user-supplied ID"
      stack: [php]
    - regex: '\.create\(req\.body\)|\.update\(.*req\.body\)'
      description: "Mass Assignment — passing entire req.body to ORM"
      stack: [js, ts]
    - regex: 'Object\.assign\(.*req\.body\)'
      description: "Mass Assignment — Object.assign with req.body"
      stack: [js, ts]
    - regex: '\{\.\.\.req\.body\}'
      description: "Mass Assignment — spread req.body"
      stack: [js, ts]
    - regex: 'new\s+\w+\(req\.body\)'
      description: "Mass Assignment — constructor receives entire body"
      stack: [js, ts]
    - regex: 'wp_update_user\(.*\$_POST'
      description: "WordPress mass assignment — updating user from raw POST"
      stack: [php]
    - regex: 'app\.(get|post|put|patch|delete)\('
      description: "Route handler — check for auth middleware"
      stack: [js, ts]
    - regex: 'router\.(get|post|put|delete)\('
      description: "Router handler — check for auth middleware"
      stack: [js, ts]
    - regex: 'jwt\.decode\('
      description: "JWT decode instead of verify — does not validate signature"
      stack: [js, ts, py]
