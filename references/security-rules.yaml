      stack: [js, ts, py, php, java]
    - regex: 'sendMail|sendSms|sendNotification'
      description: "Gửi email/SMS — cần rate limiting để tránh abuse"
      stack: [js, ts, py, php, java]
    - regex: 'status\s*=\s*[''"]'
      description: "Direct status assignment — kiểm tra state machine validation"
      stack: [js, ts, py, php, java]
  fixes:
    - pattern: "Race condition"
      fix: "Dùng database transaction + SELECT FOR UPDATE, hoặc distributed lock (Redis/Redlock)"
    - pattern: "Business logic bypass"
      fix: "Tính giá/tổng server-side từ database, validate trạng thái trước khi chuyển đổi"
    - pattern: "Thiếu rate limiting"
      fix: "Thêm rate limiter (express-rate-limit, @nestjs/throttler) vào endpoints nhạy cảm"
    - pattern: "Missing abuse case"
      fix: "Giới hạn upload size, bulk operations, pagination, email sending frequency"
    - pattern: "State transition"
      fix: "Dùng state machine pattern, enum cho states, validate previous state trước khi chuyển"
  fastcode_queries:
    - "Endpoint nào có rate limiting middleware?"
    - "Function nào có sử dụng database transaction?"
    - "Giá trị price/amount/total có được tính lại server-side hay lấy từ client?"

