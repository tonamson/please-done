    - regex: 'Twig.*createTemplate\('
      description: "SSTI — Twig user template"
      stack: [php]
    - regex: 'ejs\.render\(.*req\.'
      description: "SSTI — EJS user input into template"
      stack: [js, ts]
    - regex: 'Handlebars\.compile\(.*req\.'
      description: "SSTI — Handlebars user template"
      stack: [js, ts]
    - regex: 'pug\.render\(.*req\.'
      description: "SSTI — Pug user template"
      stack: [js, ts]
    - regex: 'libxml_disable_entity_loader\(false\)'
      description: "XXE — PHP explicitly enables external entities"
      stack: [php]
    - regex: 'simplexml_load_string\(.*\$_(GET|POST)'
      description: "XXE — PHP XML from user input"
      stack: [php]
    - regex: 'lxml\.etree\.parse\('
      description: "XXE — Python lxml (needs resolve_entities=False)"
      stack: [py]
  fixes:
    - pattern: "Node.js deserialization"
      fix: "Do not use node-serialize. Use JSON.parse() for data, yaml.safeLoad/load with SAFE_SCHEMA"
    - pattern: "PHP unserialize"
      fix: "Use json_decode() instead of unserialize(). If necessary, use allowed_classes option"
    - pattern: "Python pickle"
      fix: "Use JSON instead of pickle for untrusted data. If complex serialization needed, use marshmallow"
    - pattern: "SSTI"
      fix: "Do not use render_template_string with user input. Use render_template with fixed template files"
    - pattern: "XXE"
      fix: "Disable external entities: libxml_disable_entity_loader(true), lxml resolve_entities=False"
    - pattern: "Ruby deserialization"
      fix: "Use YAML.safe_load instead of YAML.load, JSON.parse instead of Marshal.load"
  fastcode_queries:
