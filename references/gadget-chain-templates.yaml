# gadget-chain-templates.yaml — Common chain patterns for cross-category analysis
# Used by detectChains() in bin/lib/gadget-chain.js
# Each chain links findings from 2+ categories into an attack chain

chains:
  - id: sqli-data-leak
    name: "SQL Injection -> Data Leak"
    description: "SQLi allows extraction of sensitive data from DB"
    links:
      - from_cat: sql-injection
        to_cat: secrets
        condition: "sql-injection FAIL/FLAG + secrets FAIL/FLAG"
    root: sql-injection
    escalation: "+1"

  - id: idor-privesc
    name: "IDOR -> Privilege Escalation"
    description: "Missing ownership check allows access to other users' resources"
    links:
      - from_cat: auth
        to_cat: auth
        condition: "auth FAIL/FLAG with both IDOR and role check"
    root: auth
    escalation: "+1"

  - id: xss-session-hijack
    name: "XSS -> Session Hijacking"
    description: "XSS allows stealing session cookie/token"
    links:
      - from_cat: xss
        to_cat: auth
        condition: "xss FAIL/FLAG + auth FAIL/FLAG"
    root: xss
    escalation: "+1"

  - id: cmd-injection-rce
    name: "Command Injection -> RCE"
    description: "OS command injection leads to remote code execution"
    links:
      - from_cat: cmd-injection
        to_cat: misconfig
        condition: "cmd-injection FAIL/FLAG + misconfig FAIL/FLAG"
    root: cmd-injection
    escalation: "+1"

  - id: deserialization-rce
    name: "Deserialization -> RCE"
    description: "Unsafe deserialization leads to arbitrary code execution"
    links:
      - from_cat: deserialization
        to_cat: cmd-injection
        condition: "deserialization FAIL/FLAG + cmd-injection FAIL/FLAG"
    root: deserialization
    escalation: "+1"

  - id: path-traversal-data-leak
    name: "Path Traversal -> Sensitive Data Exposure"
    description: "Arbitrary file read leads to secrets/config exposure"
    links:
      - from_cat: path-traversal
        to_cat: secrets
        condition: "path-traversal FAIL/FLAG + secrets FAIL/FLAG"
    root: path-traversal
    escalation: "+1"

  - id: prototype-pollution-rce
    name: "Prototype Pollution -> RCE"
    description: "Prototype pollution leads to code execution via gadget"
    links:
      - from_cat: prototype-pollution
        to_cat: cmd-injection
        condition: "prototype-pollution FAIL/FLAG + cmd-injection FAIL/FLAG"
    root: prototype-pollution
    escalation: "+1"
